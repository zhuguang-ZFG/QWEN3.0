# LiMa backend retirement alerting rules (M3).
# Mount under Prometheus rule_files, e.g.:
#   rule_files:
#     - /opt/lima-monitoring/prometheus/rules/backend_retirement_alerts.yml
#
# Scrape target: https://chat.donglicao.com/v1/ops/metrics/prometheus (Bearer auth)

groups:
  - name: lima_backend_retirement
    rules:
      - alert: LiMaBackendRetired
        expr: lima_backend_retired == 1
        for: 5m
        labels:
          severity: warning
          service: lima-router
        annotations:
          summary: "LiMa backend {{ $labels.backend }} is retired"
          description: >-
            Backend {{ $labels.backend }} has been removed from routing pools for at least 5 minutes.
            Review /v1/ops/summary and probe before POST /v1/ops/backends/reactivate.

      - alert: LiMaBackendRetiredCountHigh
        expr: lima_backend_retired_count > 0
        for: 10m
        labels:
          severity: warning
          service: lima-router
        annotations:
          summary: "{{ $value }} LiMa backend(s) retired"
          description: >-
            lima_backend_retired_count={{ $value }} for 10m. Check recovery.probe_candidates in /v1/ops/summary.

      - alert: LiMaBackendRetirementSpike
        expr: increase(lima_backend_retirement_events_total[15m]) > 0
        for: 0m
        labels:
          severity: info
          service: lima-router
        annotations:
          summary: "New backend retirement on {{ $labels.backend }}"
          description: >-
            lima_backend_retirement_events_total increased in the last 15 minutes for {{ $labels.backend }}.
