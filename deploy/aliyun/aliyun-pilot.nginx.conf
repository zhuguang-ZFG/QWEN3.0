# Aliyun LiMa Router Pilot nginx configuration.
# Place this in /etc/nginx/conf.d/ on the Aliyun VPS.
#
# This server block exposes the pilot on a dedicated subdomain for
# verification before Cloudflare Load Balancer starts splitting traffic.

server {
    server_name aliyun.donglicao.com;
    listen 443 ssl http2;

    # TLS certificates are managed by certbot / Let's Encrypt on Aliyun.
    # ssl_certificate /etc/letsencrypt/live/donglicao.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/donglicao.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming support
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# Redirect HTTP to HTTPS.
server {
    server_name aliyun.donglicao.com;
    listen 80;
    return 301 https://$server_name$request_uri;
}
