# Alertmanager configuration for LiMa JDCloud monitoring stack.
# Placeholders __DINGTALK_WEBHOOK_URL__ / __WECHAT_WEBHOOK_URL__ are replaced
# by deploy/jdcloud/update_alertmanager.sh using environment variables.

route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        service: lima-router
      receiver: 'lima-router'
      continue: true

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://127.0.0.1:9/default-placeholder'
        send_resolved: false

  - name: 'critical'
    webhook_configs:
      - url: '__DINGTALK_WEBHOOK_URL__'
        send_resolved: true

  - name: 'lima-router'
    webhook_configs:
      - url: '__WECHAT_WEBHOOK_URL__'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
