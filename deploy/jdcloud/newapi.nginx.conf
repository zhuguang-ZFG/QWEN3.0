# Sanitized snapshot for new-api 反代
# 用途: JDCloud 117.72.118.95 上 /etc/nginx/sites-available/api.donglicao.com.conf
# 关联: docs/ops/JDCLOUD_NEWAPI_DEPLOY.md §3.4
# 部署: cp newapi.nginx.conf /etc/nginx/sites-available/<your-domain>.conf
#       ln -s ... /etc/nginx/sites-enabled/
#       certbot --nginx -d <your-domain>

# 限流 zone（与 chat.donglicao.com 风格一致）
# 如本 server 块首个出现，保留在 /etc/nginx/conf.d/limit_req.conf 顶层
# limit_req_zone $binary_remote_addr zone=api_newapi:10m rate=30r/s;

# === HTTP → HTTPS 重定向 ===
server {
    listen 80;
    server_name api.donglicao.com;
    return 301 https://$host$request_uri;
}

# === HTTPS 入口 ===
server {
    listen 443 ssl;
    server_name api.donglicao.com;

    # TLS 证书（certbot 申请后会替换为 live 路径）
    ssl_certificate     /etc/letsencrypt/live/api.donglicao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.donglicao.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 安全 headers（与 chat.donglicao.com 一致）
    add_header Strict-Transport-Security "max-age=15552000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # new-api 后台有渠道 logo 上传、模型配置导入
    client_max_body_size 50m;

    # 通用代理参数（保 SSE 流式 + 长 timeout）
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # 公网限流（保护 new-api / 上游渠道额度）
    limit_req zone=api_newapi burst=30 nodelay;

    # === new-api 内部 3000（loopback）===
    location / {
        proxy_pass http://127.0.0.1:3000;
    }

    # === 健康检查（绕过限流） ===
    location = /api/status {
        limit_req off;
        proxy_pass http://127.0.0.1:3000;
    }
}
