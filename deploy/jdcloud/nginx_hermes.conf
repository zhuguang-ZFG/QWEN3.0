# Nginx 配置 - Hermes Agent Gateway
# 路径: /etc/nginx/sites-available/hermes-gateway.conf

server {
    listen 80;
    server_name 117.72.118.95;

    # 健康检查端点（公开）
    location /hermes/health {
        proxy_pass http://127.0.0.1:8699/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        access_log /var/log/nginx/hermes_health.log;
    }

    # API 端点（仅允许阿里云 VPS 访问）
    location /hermes/v1/ {
        # 安全限制：仅允许阿里云 VPS
        allow 47.112.162.80;
        deny all;

        proxy_pass http://127.0.0.1:8699/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置（Agent 任务可能较长）
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # 缓冲配置
        proxy_buffering off;
        proxy_request_buffering off;

        access_log /var/log/nginx/hermes_api.log;
        error_log /var/log/nginx/hermes_error.log;
    }

    # 拒绝其他路径
    location / {
        return 404;
    }
}
