# one-api path rewrite proxy for non-standard providers
# zhipu: /v1/chat/completions -> /api/paas/v4/chat/completions
# github: /v1/chat/completions -> /chat/completions

server {
    listen 8901;
    server_name localhost;

    location /v1/chat/completions {
        proxy_pass https://open.bigmodel.cn/api/paas/v4/chat/completions;
        proxy_set_header Host open.bigmodel.cn;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header Authorization $http_authorization;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}

server {
    listen 8902;
    server_name localhost;

    location /v1/chat/completions {
        proxy_pass https://models.inference.ai.azure.com/chat/completions;
        proxy_set_header Host models.inference.ai.azure.com;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header Authorization $http_authorization;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}
