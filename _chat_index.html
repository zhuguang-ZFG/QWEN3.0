<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiMa AI - 智能编程助手</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">LiMa AI</div>
        <button class="new-chat-btn" id="newChatBtn" title="新建对话">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="搜索对话..." />
      </div>
      <div class="conversation-list" id="conversationList"></div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <main class="main">
      <header class="main-header">
        <button class="hamburger" id="hamburgerBtn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
        <span class="header-title" id="headerTitle">新对话</span>
      </header>
      <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcomeScreen">
          <h1 class="welcome-greeting">你好，我是 LiMa</h1>
          <p class="welcome-subtitle">智能编程助手，有什么可以帮你的？</p>
          <div class="smart-route-indicator">
            <span class="route-dot"></span>
            <span class="route-text">智能路由 · 自动识别意图 · 匹配最优模型</span>
          </div>
          <div class="tech-tagline">
            <span class="tag">SFT</span>
            <span class="tag">LoRA</span>
            <span class="tag">DPO</span>
            <span class="tag">MoE</span>
            <span class="tag">CoT</span>
            <span class="tag">RLHF</span>
          </div>
          <p class="tech-desc">多轮 SFT 对齐 + DPO 偏好优化 · LoRA 高效微调 · MoE 多专家路由架构</p>
        </div>
        <div class="messages" id="messages"></div>
      </div>
      <div class="input-panel">
        <div class="input-container">
          <button class="attach-btn" id="attachBtn" title="上传图片">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <button class="voice-btn" id="voiceBtn" title="语音输入">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
          <div class="textarea-wrap">
            <textarea id="chatInput" placeholder="给 LiMa 发送消息" rows="1"></textarea>
            <div class="image-preview" id="imagePreview"></div>
          </div>
          <button class="send-btn" id="sendBtn" title="发送" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
        <div class="tool-buttons">
          <div class="mode-tabs" id="modeTabs">
            <button class="mode-tab active" data-mode="fast" title="快速响应">⚡ 快速</button>
            <button class="mode-tab" data-mode="thinking" title="深度思考">🧠 思考</button>
            <button class="mode-tab" data-mode="code" title="代码专家">💻 代码</button>
          </div>
          <button class="export-btn" id="exportBtn" title="导出对话">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>
  <input type="file" id="fileInput" accept="image/*" hidden />
  <script src="markdown.js"></script>
  <script src="app.js"></script>
</body>
</html>
