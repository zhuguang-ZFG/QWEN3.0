services:
  lima:
    build: .
    container_name: lima
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      # Point device/task Redis to the compose-managed Redis by default.
      # Override in .env if you use an external Redis.
      LIMA_DEVICE_REDIS_URL: redis://redis:6379/0
      LIMA_DEVICE_AUTH_RATE_REDIS_URL: redis://redis:6379/0
    volumes:
      # Persist SQLite DB, uploads, logs, and other runtime data.
      - lima-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: lima-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional SearXNG meta-search companion (default off via SEARXNG_ENABLED=0).
  # Enable and configure SEARXNG_BASE_URL in .env if needed.
  searxng:
    image: searxng/searxng
    container_name: lima-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8081/
    volumes:
      - searxng-data:/etc/searxng
    profiles: ["searxng"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  lima-data:
  redis-data:
  searxng-data:
