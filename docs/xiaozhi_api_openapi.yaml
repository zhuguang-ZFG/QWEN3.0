openapi: "3.0.3"

info:

  title: LiMa Smart Device Cloud API

  description: |

    OpenAPI specification for LiMa's replacement of XiaoZhi (å°æº) server APIs.

    Covers the P0/P1 core interfaces for device management, user authentication,

    task dispatch, and family member management.



    **Phase 0 migration scope:** 28 core endpoints across 6 domains.

    Original source: XiaoZhi Java Spring Boot controllers (27 Controller files).

  version: "1.0.0"

  contact:

    name: LiMa Team

    url: https://donglicao.com



servers:

  - url: https://chat.donglicao.com

    description: Production API server (LiMa native `/device/v1/app/*`, upload `/upload`, XiaoZhi compat `/api/v1/*`)

  - url: http://localhost:8080

    description: Local development



tags:

  - name: Auth

    description: User authentication (P0)

  - name: Device

    description: Device binding and management (P0)

  - name: Task

    description: Motion/capability task dispatch (P0)

  - name: Member

    description: Family member management (P1)

  - name: Voiceprint

    description: Voiceprint enrollment and management (P1)

  - name: Transfer

    description: Device transfer between accounts (P1)

  - name: Supply

    description: Device consumable status (P2)

  - name: SelfCheck

    description: Device self-check diagnostics (P2)



# ââ Security ââââââââââââââââââââââââââââââââââââââââââââââââââââââââ

security:

  - bearerAuth: []



components:

  securitySchemes:

    bearerAuth:

      type: http

      scheme: bearer

      bearerFormat: JWT

      description: |

        JWT token obtained from `/auth/login`. Include in Authorization header.



  # ââ Schemas ââââââââââââââââââââââââââââââââââââââââââââââââââââââ

  schemas:

    # ââ Common ââ

    ErrorResponse:

      type: object

      properties:

        code:

          type: integer

          description: Error code

        message:

          type: string

          description: Human-readable error message



    Result:

      type: object

      description: Generic success response wrapper

      properties:

        code:

          type: integer

          example: 0

        data:

          description: Response payload (varies by endpoint)



    # ââ Auth ââ

    LoginRequest:

      type: object

      required: [phone, code]

      properties:

        phone:

          type: string

          pattern: '^\+?[0-9]{10,15}$'

          example: "+86-13800138000"

          description: Phone number with optional country code

        code:

          type: string

          minLength: 4

          maxLength: 6

          example: "123456"

          description: SMS verification code



    LoginResponse:

      type: object

      properties:

        token:

          type: string

          description: JWT access token

        expiresIn:

          type: integer

          example: 86400

          description: Token expiry in seconds



    RegisterRequest:

      type: object

      required: [phone, code]

      properties:

        phone:

          type: string

          pattern: '^\+?[0-9]{10,15}$'

        code:

          type: string

          minLength: 4

          maxLength: 6

        nickname:

          type: string

          maxLength: 50



    SmsVerificationRequest:

      type: object

      required: [mobile, captchaId, captcha]

      properties:

        mobile:

          type: string

          pattern: '^\+?[0-9]{10,15}$'

        captchaId:

          type: string

          description: UUID of the captcha image

        captcha:

          type: string

          minLength: 4

          maxLength: 6



    UserInfo:

      type: object

      properties:

        id:

          type: string

          format: uuid

        phone:

          type: string

        nickname:

          type: string

        avatarUrl:

          type: string

          format: uri

        role:

          type: string

          enum: [user, admin]

        status:

          type: string

          enum: [active, disabled, deleted]

        createdAt:

          type: string

          format: date-time



    # ââ Device ââ

    DeviceRegisterRequest:

      type: object

      required: [macAddress]

      properties:

        macAddress:

          type: string

          pattern: '^([0-9A-Fa-f]{2}[:-]?){5}([0-9A-Fa-f]{2})$'

          example: "AA:BB:CC:DD:EE:FF"

          description: Device MAC address



    DeviceRegisterResponse:

      type: object

      properties:

        code:

          type: string

          minLength: 6

          maxLength: 6

          example: "482931"

          description: 6-digit activation code to enter on device



    DeviceInfo:

      type: object

      properties:

        id:

          type: string

          format: uuid

        deviceSn:

          type: string

          description: Device serial number

        model:

          type: string

          enum: [esp32s3_xyz, esp32c3_mini]

        firmwareVer:

          type: string

        hardwareVer:

          type: string

        status:

          type: string

          enum: [online, offline, maintenance, retired]

        lastHeartbeat:

          type: string

          format: date-time

        mqttTopic:

          type: string

        metadata:

          type: string

          description: JSON string with extended properties



    DeviceUpdateRequest:

      type: object

      properties:

        nickname:

          type: string

        firmwareVer:

          type: string



    DeviceManualAddRequest:

      type: object

      required: [deviceSn, model]

      properties:

        deviceSn:

          type: string

        model:

          type: string



    # ââ Task ââ

    TaskSubmitRequest:

      type: object

      required: [capability]

      properties:

        capability:

          type: string

          enum: [run_path, draw_image, home, calibrate]

          description: Task capability / intent

        params:

          type: object

          description: Capability-specific parameters

          properties:

            path:

              type: array

              items:

                $ref: '#/components/schemas/PathPoint'

            feed:

              type: number

              description: Feed rate in mm/min

            imageUrl:

              type: string

              format: uri

              description: Image URL for draw_image tasks

        source:

          type: string

          enum: [api, voice, scheduled]

          default: api

        memberId:

          type: string

          format: uuid

          description: Optional family member who initiated the task



    PathPoint:

      type: object

      required: [x, y]

      properties:

        x:

          type: number

          description: X coordinate in mm

        y:

          type: number

          description: Y coordinate in mm

        z:

          type: number

          default: 0

          description: Z coordinate in mm (pen up/down)



    TaskInfo:

      type: object

      properties:

        id:

          type: string

          format: uuid

        deviceId:

          type: string

          format: uuid

        capability:

          type: string

        params:

          type: string

          description: JSON string of task parameters

        source:

          type: string

          enum: [api, voice, scheduled]

        status:

          type: string

          enum: [pending, approved, running, completed, failed, cancelled, rejected]

        progress:

          type: number

          minimum: 0

          maximum: 1

        errorMsg:

          type: string

        memberId:

          type: string

          format: uuid

        createdAt:

          type: string

          format: date-time

        startedAt:

          type: string

          format: date-time

        completedAt:

          type: string

          format: date-time



    TaskApproveRequest:

      type: object

      properties:

        comment:

          type: string

          description: Optional approval comment



    # ââ Member ââ

    MemberCreateRequest:

      type: object

      required: [deviceId, name]

      properties:

        deviceId:

          type: string

          format: uuid

        name:

          type: string

          maxLength: 50

          example: "å°æ"

        role:

          type: string

          enum: [child, parent, guest]

          default: child

        avatarUrl:

          type: string

          format: uri



    MemberInfo:

      type: object

      properties:

        id:

          type: string

          format: uuid

        accountId:

          type: string

          format: uuid

        deviceId:

          type: string

          format: uuid

        name:

          type: string

        role:

          type: string

          enum: [child, parent, guest]

        avatarUrl:

          type: string

          format: uri

        voiceprintId:

          type: string

          format: uuid

        status:

          type: string

          enum: [active, disabled]

        createdAt:

          type: string

          format: date-time



    # ââ Voiceprint ââ

    VoiceprintEnrollRequest:

      type: object

      required: [memberId, deviceId]

      properties:

        memberId:

          type: string

          format: uuid

        deviceId:

          type: string

          format: uuid



    VoiceprintInfo:

      type: object

      properties:

        id:

          type: string

          format: uuid

        memberId:

          type: string

          format: uuid

        memberName:

          type: string

        deviceId:

          type: string

          format: uuid

        sampleCount:

          type: integer

          minimum: 0

        confidence:

          type: number

          minimum: 0

          maximum: 1

        status:

          type: string

          enum: [enrolled, verifying, disabled]

        createdAt:

          type: string

          format: date-time



    # ââ Transfer ââ

    TransferRequest:

      type: object

      required: [deviceId, toPhone]

      properties:

        deviceId:

          type: string

          format: uuid

        toPhone:

          type: string

          pattern: '^\+?[0-9]{10,15}$'

          description: Phone number of the receiving account



    TransferInfo:

      type: object

      properties:

        id:

          type: string

          format: uuid

        deviceId:

          type: string

          format: uuid

        fromAccountId:

          type: string

          format: uuid

        toAccountId:

          type: string

          format: uuid

        status:

          type: string

          enum: [pending, accepted, cancelled, expired]

        reason:

          type: string

        expiresAt:

          type: string

          format: date-time

        createdAt:

          type: string

          format: date-time



    # ââ Supply ââ

    SupplyUpdateRequest:

      type: object

      properties:

        pen:

          type: object

          properties:

            level:

              type: number

              minimum: 0

              maximum: 1

            status:

              type: string

              enum: [normal, low, empty]

        paper:

          type: object

          properties:

            level:

              type: number

              minimum: 0

              maximum: 1

            status:

              type: string

              enum: [normal, low, empty]

        battery:

          type: object

          properties:

            level:

              type: number

              minimum: 0

              maximum: 1

            status:

              type: string

              enum: [normal, low, empty]



    SupplyInfo:

      type: object

      properties:

        id:

          type: string

          format: uuid

        deviceId:

          type: string

          format: uuid

        supplyType:

          type: string

          enum: [pen, paper, battery]

        level:

          type: number

        status:

          type: string

          enum: [normal, low, empty, unknown]



    # ââ SelfCheck ââ

    SelfCheckInfo:

      type: object

      properties:

        id:

          type: string

          format: uuid

        deviceId:

          type: string

          format: uuid

        checkType:

          type: string

          enum: [startup, periodic, manual]

        result:

          type: string

          enum: [pass, fail, warning]

        details:

          type: string

          description: JSON details of check results

        durationMs:

          type: integer

        triggeredBy:

          type: string

          enum: [system, user, api]

        createdAt:

          type: string

          format: date-time



    # ââ Account ââ

    AccountDeleteResponse:

      type: object

      properties:

        deletedAt:

          type: string

          format: date-time

          description: Soft-delete timestamp



# ââ Paths ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ

paths:

  # âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ?  # P0: Auth

  # âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ?  /auth/login:

    post:

      tags: [Auth]

      summary: Login (phone + SMS code)

      description: |

        **P0** â?Primary login endpoint for device owners.

        Authenticates via phone number and SMS verification code, returns JWT token.

      operationId: login

      security: []

      requestBody:

        required: true

        content:

          application/json:

            schema:

              $ref: '#/components/schemas/LoginRequest'

      responses:

        '200':

          description: Login successful

          content:

            application/json:

              schema:

                allOf:

                  - $ref: '#/components/schemas/Result'

                  - properties:

                      data:

                        $ref: '#/components/schemas/LoginResponse'

        '401':

          description: Invalid credentials

          content:

            application/json:

              schema:

                $ref: '#/components/schemas/ErrorResponse'



  /device/v1/app/auth/register:

    post:

      tags: [Auth]

      summary: Register new account

      description: |

        **P0** â?Register a new user account with phone number and SMS code.

      operationId: register

      security: []

      requestBody:

        required: true

        content:

          application/json:

            schema:

              $ref: '#/components/schemas/RegisterRequest'

      responses:

        '200':

          description: Registration successful

          content:

            application/json:

              schema:

                allOf:

                  - $ref: '#/components/schemas/Result'

                  - properties:

                      data:

                        $ref: '#/components/schemas/LoginResponse'

        '400':

          description: Validation error (e.g., phone already registered)

          content:

            application/json:

              schema:

                $ref: '#/components/schemas/ErrorResponse'



  /device/v1/app/auth/sms-verification:

    post:

      tags: [Auth]

      summary: Send SMS verification code

      description: |

        **P0** â?Send SMS verification code to phone. Requires captcha validation first.

      operationId: sendSmsCode

      security: []

      requestBody:

        required: true

        content:

          application/json:

            schema:

              $ref: '#/components/schemas/SmsVerificationRequest'

      responses:

        '200':

          description: SMS code sent

        '400':

          description: Captcha validation failed

          content:

            application/json:

              schema:

                $ref: '#/components/schemas/ErrorResponse'



  /api/v1/auth/captcha:

    get:

      tags: [Auth]

      summary: Get captcha image

      description: Retrieve a captcha image for SMS verification anti-abuse.

      operationId: getCaptcha

      security: []

      parameters:

        - name: uuid

          in: query

          required: true

          schema:

            type: string

          description: Unique identifier for this captcha session

      responses:

        '200':

          description: Captcha image (PNG/JPEG)

          content:

            image/png: {}



  /device/v1/app/auth/me:

    get:

      tags: [Auth]

      summary: Get current user info

      operationId: getUserInfo

      responses:

        '200':

          description: User info

          content:

            application/json:

              schema:

                allOf:

                  - $ref: '#/components/schemas/Result'

                  - properties:

                      data:

                        $ref: '#/components/schemas/UserInfo'



  /api/v1/auth/change-password:

    put:

      tags: [Auth]

      summary: Change password

      operationId: changePassword

      requestBody:

        required: true

        content:

          application/json:

            schema:

              type: object

              required: [oldPassword, newPassword]

              properties:

                oldPassword:

                  type: string

                newPassword:

                  type: string

                  minLength: 6

      responses:

        '200':

          description: Password changed



  /device/v1/app/auth/account/delete:

    post:

      tags: [Auth]

      summary: Delete account (soft)

      description: |

        **P1** â?Soft-delete the current account. Device bindings are unbound, data is anonymized.

      operationId: deleteAccount

      responses:

        '200':

          description: Account soft-deleted

          content:

            application/json:

              schema:

                allOf:

                  - $ref: '#/components/schemas/Result'

                  - properties:

                      data:

                        $ref: '#/components/schemas/AccountDeleteResponse'



  # âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ?  # P0: Device Binding & Management

  # âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ?  /devices/register:

    post:

      tags: [Device]

      summary: Register device (get activation code)

      description: |

        **P0** â?Register a new device by MAC address and receive a 6-digit activation code.

        The user enters this code on the device to complete pairing.

      operationId: registerDevice

      requestBody:

        required: true

        content:

          application/json:

            schema:

              $ref: '#/components/schemas/DeviceRegisterRequest'

      responses:

        '200':

          description: Activation code generated

          content:

            application/json:

              schema:

                allOf:

                  - $ref: '#/components/schemas/Result'

                  - properties:

                      data:

                        $ref: '#/components/schemas/DeviceRegisterResponse'



  /device/v1/app/devices/bind:

    post:

      tags: [Device]

      summary: Bind a device

      description: |

        **P0** â?Bind a device to the current account using serial number and activation code.

      operationId: bindDevice

      requestBody:

        required: true

        content:

          application/json:

            schema:

              type: object

              required: [deviceSn, activationCode]

              properties:

                deviceSn:

                  type: string

                  description: Device serial number

                activationCode:

                  type: string

                  minLength: 6

                  maxLength: 6

                  description: 6-digit code from /devices/register

      responses:

        '200':

          description: Device bound successfully

        '400':

          description: Invalid code or device already bound

          content:

            application/json:

              schema:

                $ref: '#/components/schemas/ErrorResponse'



  /device/v1/app/devices:

    get:

      tags: [Device]

      summary: List bound devices

      operationId: listDevices

      responses:

        '200':

          description: List of devices

          content:

            application/json:

              schema:

                allOf:

                  - $ref: '#/components/schemas/Result'

                  - properties:

                      data:

                        type: array

                        items:

                          $ref: '#/components/schemas/DeviceInfo'



  /device/v1/app/devices/{deviceId}:

    get:

      tags: [Device]

      summary: Get device details

      operationId: getDevice

      parameters:

        - name: deviceId

          in: path

          required: true

          schema:

            type: string

            format: uuid

      responses:

        '200':

          description: Device details

          content:

            application/json:

              schema:

                allOf:

                  - $ref: '#/components/schemas/Result'

                  - properties:

                      data:

                        $ref: '#/components/schemas/DeviceInfo'



    put:

      tags: [Device]

      summary: Update device info

      operationId: updateDevice

      parameters:

        - name: deviceId

          in: path

          required: true

          schema:

            type: string

            format: uuid

      requestBody:

        required: true

        content:

          application/json:

            schema:

              $ref: '#/components/schemas/DeviceUpdateRequest'

      responses:

        '200':

          description: Device updated



  /device/v1/app/devices/{deviceId}/unbind:

    post:

      tags: [Device]

      summary: Unbind device

      operationId: unbindDevice

      parameters:

        - name: deviceId

          in: path

          required: true

          schema:

            type: string

            format: uuid

      responses:

        '200':

          description: Device unbound



  /device/v1/app/devices/manual-add:

    post:

      tags: [Device]

      summary: Manually add device

      description: Admin-only endpoint for manually registering a device by serial number.

      operationId: manualAddDevice

      requestBody:

        required: true

        content:

          application/json:

            schema:

              $ref: '#/components/schemas/DeviceManualAddRequest'

      responses:

        '200':

          description: Device added



  # âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ?  # P0: Task Dispatch

  # âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ?  /devices/{deviceId}/tasks:

    post:

      tags: [Task]

      summary: Submit a motion/capability task

      description: |

        **P0** â?Submit a task to a bound device. Supports `run_path` (draw path),

        `draw_image` (AI image-to-path), `home`, and `calibrate` intents.

      operationId: submitTask

      parameters:

        - name: deviceId

          in: path

          required: true

