                allOf:
                  - $ref: '#/components/schemas/Result'
                  - properties:
                      data:
                        $ref: '#/components/schemas/VoiceprintInfo'

  /voiceprints/{voiceprintId}:
    delete:
      tags: [Voiceprint]
      summary: Delete voiceprint
      description: Soft-delete a voiceprint and anonymize matching data.
      operationId: deleteVoiceprint
      parameters:
        - name: voiceprintId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Voiceprint deleted

  # в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?  # P1: Device Transfer
  # в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?  /devices/{deviceId}/transfer:
    post:
      tags: [Transfer]
      summary: Request device transfer
      description: |
        **P1** вҖ?Initiate a device transfer to another account (by phone number).
        The recipient has 48 hours to accept.
      operationId: requestTransfer
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '200':
          description: Transfer requested
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
                  - properties:
                      data:
                        $ref: '#/components/schemas/TransferInfo'

  /transfers/pending:
    get:
      tags: [Transfer]
      summary: List pending incoming transfers
      operationId: listPendingTransfers
      responses:
        '200':
          description: Pending transfers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Result'
