  /upload:
    post:
      tags: [Upload]
      summary: Upload an image file
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: File uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                      name:
                        type: string
                      size:
                        type: integer
                      token:
                        type: string
                        description: HMAC download token (also embedded in url query)

  /uploads/{filename}:
    get:
      tags: [Upload]
      summary: Download a previously uploaded file
      operationId: serveUploadedFile
      security: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: HMAC time-limited access token returned by POST /upload
      responses:
        '200':
          description: File content
        '401':
          description: Missing or invalid token (unless LIMA_UPLOAD_PUBLIC_GET=1)
        '404':
          description: File not found

components:
  schemas:
    ChatSession:
      type: object
      properties:
        sessionId:
          type: string
        title:
          type: string
        chatCount:
          type: integer
        createdAt:
          type: string
    ChatMessage:
      type: object
      properties:
        chatType:
          type: integer
        content:
          type: string
        audioId:
          type: string
          nullable: true
        createdAt:
          type: string
    ChatHistoryEntry:
      type: object
      properties:
        content:
          type: string
        audioId:
          type: string
