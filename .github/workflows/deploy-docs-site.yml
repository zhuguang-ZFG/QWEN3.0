name: Deploy Docs Site

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/deploy-docs-site.yml"
  workflow_dispatch:

concurrency:
  group: deploy-docs-site
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Install dependencies and build
        working-directory: docs-site
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Deploy to VPS
        if: ${{ secrets.VPS_HOST != '' && secrets.DOCS_SITE_DIR != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docs-site/.vitepress/dist/*"
          target: ${{ secrets.DOCS_SITE_DIR }}
          strip_components: 3
          rm: true

      - name: Reload nginx
        if: ${{ secrets.VPS_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            nginx -t && systemctl reload nginx
