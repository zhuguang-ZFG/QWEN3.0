name: Deploy Docs Site
on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/deploy-docs-site.yml"
  workflow_dispatch:
concurrency:
  group: deploy-docs-site
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies and build
        working-directory: docs-site
        run: |
          corepack pnpm install --frozen-lockfile
          corepack pnpm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs-site/.vitepress/dist --project-name=lima-docs --branch=main
      - name: Smoke test (Pages dev + custom domain)
        run: |
          for url in https://lima-docs.pages.dev/ https://docs.donglicao.com/; do
            for i in {1..12}; do
              echo "Checking $url (attempt $i)..."
              if curl -sf --max-time 10 "$url" -o /dev/null; then
                echo "$url OK"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "$url failed after 12 attempts"
                exit 1
              fi
              sleep 5
            done
          done
          echo "docs-site Pages deploy OK"
