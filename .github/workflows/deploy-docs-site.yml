name: Deploy Docs Site
on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/deploy-docs-site.yml"
  workflow_dispatch:
concurrency:
  group: deploy-docs-site
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies and build
        working-directory: docs-site
        run: |
          corepack pnpm install --frozen-lockfile
          corepack pnpm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs-site/.vitepress/dist --project-name=lima-docs --branch=main
      - name: Smoke test (Pages dev domain)
        run: |
          curl -sf --retry 5 --retry-delay 5 --retry-connrefused https://lima-docs.pages.dev/ -o /dev/null
          echo "docs-site Pages deploy OK"
