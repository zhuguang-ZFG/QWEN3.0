name: Deploy Docs Site

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/deploy-docs-site.yml"
  workflow_dispatch:

concurrency:
  group: deploy-docs-site
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VPS_SSH_KEY_SET: ${{ secrets.VPS_SSH_KEY != '' }}
      VPS_HOST_SET: ${{ secrets.VPS_HOST != '' }}
      DOCS_SITE_DIR_SET: ${{ secrets.DOCS_SITE_DIR != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies and build
        working-directory: docs-site
        run: |
          corepack pnpm install --frozen-lockfile
          corepack pnpm run build

      - name: Deploy to VPS
        if: env.VPS_HOST_SET == 'true' && env.DOCS_SITE_DIR_SET == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docs-site/.vitepress/dist/*"
          target: ${{ secrets.DOCS_SITE_DIR }}
          strip_components: 3
          rm: true

      - name: Reload nginx
        if: env.VPS_HOST_SET == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            nginx -t && systemctl reload nginx
