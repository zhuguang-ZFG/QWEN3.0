name: Deploy Chat Web

on:
  push:
    branches: [main]
    paths:
      - "chat-web/**"
      - ".github/workflows/deploy-chat-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-chat-web
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy chat-web --project-name=lima-chat-web --branch=main

      - name: Smoke test (Pages dev domain)
        run: |
          curl -sf --retry 5 --retry-delay 5 --retry-connrefused \
            https://lima-chat-web.pages.dev/login.html -o /dev/null
          echo "chat-web Pages deploy OK"
