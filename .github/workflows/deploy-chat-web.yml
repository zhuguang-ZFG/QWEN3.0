name: Deploy Chat Web

on:
  push:
    branches: [main]
    paths:
      - "chat-web/**"
      - ".github/workflows/deploy-chat-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-chat-web
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build hashed assets
        working-directory: chat-web
        run: node scripts/hash-assets.mjs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy chat-web/dist --project-name=lima-chat-web --branch=main

      - name: Smoke test (Pages dev + custom domain)
        run: |
          for url in https://lima-chat-web.pages.dev/login.html https://app.donglicao.com/login.html; do
            for i in {1..12}; do
              echo "Checking $url (attempt $i)..."
              if curl -sf --max-time 10 "$url" -o /dev/null; then
                echo "$url OK"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "$url failed after 12 attempts"
                exit 1
              fi
              sleep 5
            done
          done
          echo "chat-web Pages deploy OK"
