name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements_server.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_server.txt
          pip install pytest pytest-asyncio pytest-mock ruff bandit pyright freezegun hypothesis

      - name: Ruff lint and format check
        run: |
          ruff check .
          ruff format --check

      - name: Pre-commit gate (CI mode)
        run: python scripts/run_pre_commit_check.py --ci --full

      - name: Type check authority files
        run: pyright server.py routing_engine.py routes/chat_endpoints.py

      - name: Type check changed Python files
        run: |
          files=$(git diff --name-only --diff-filter=ACMRT HEAD~1 HEAD -- '*.py' '*.pyi' | tr '\n' ' ')
          if [ -n "$files" ]; then
            echo "Running pyright on changed files: $files"
            pyright $files
          else
            echo "No Python files changed"
          fi

      - name: Run test suite (AUDIT-7-D1)
        # 原工作流装了 pytest 却从不运行。pytest.ini 默认 -m "not network" 排除真实后端调用。
        run: python -m pytest --tb=short -q

      - name: Security scan
        run: bandit -r routes/ scripts/ lima_mcp_stdio/ -s B310,B324,B604,B608,B601,B108 -ll
