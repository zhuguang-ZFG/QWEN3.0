name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements_server.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_server.txt
          pip install pytest pytest-asyncio pytest-mock ruff bandit

      - name: Ruff lint
        run: ruff check .

      - name: Bandit security scan
        run: bandit -r agent_runtime/ routes/ -s B310,B324,B604 -ll

      - name: Pytest
        run: python -m pytest --tb=short -q --ignore=tests/test_telegram_dev_skills.py --ignore=tests/test_telegram_outbound.py --ignore=tests/test_backend_registry.py --ignore=tests/test_memory_daemon_ctl.py --ignore=tests/test_module_split_imports.py --ignore=tests/test_semantic_code_retrieval.py --ignore=tests/test_healthcheck_ping.py --ignore=tests/test_hypothesis_routing.py --ignore=tests/test_lima_smoke_task_script.py --ignore=tests/test_ci_gates.py --ignore=tests/test_gitee_mirror.py
