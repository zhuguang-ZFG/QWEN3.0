name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements_server.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_server.txt
          pip install pytest pytest-asyncio pytest-mock ruff bandit pyright

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check

      - name: Pyright type check (authority files)
        run: pyright server.py routing_engine.py routes/chat_endpoints.py

      - name: Bandit security scan
        run: bandit -r routes/ -s B310,B324,B604,B608 -ll

      - name: Pytest
        run: python -m pytest --tb=short -q --ignore=tests/test_memory_daemon_ctl.py --ignore=tests/test_semantic_code_retrieval.py --ignore=tests/test_healthcheck_ping.py --ignore=tests/test_deploy_unified.py
