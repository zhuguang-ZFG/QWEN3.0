name: Setup Cloudflare Pages Projects

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages projects and DNS
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import json
          import urllib.request
          import urllib.error

          TOKEN = os.environ["CLOUDFLARE_API_TOKEN"]
          ACCOUNT_ID = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          ZONE_NAME = "donglicao.com"

          PROJECTS = [
              ("lima-docs", "docs"),
              ("lima-www", "www"),
              ("lima-chat-web", "app"),
          ]
          APEX_PROJECT = "lima-www"
          APEX_DOMAIN = ZONE_NAME

          def api_call(method, url, data=None):
              req = urllib.request.Request(
                  url,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {TOKEN}",
                      "Content-Type": "application/json",
                  },
              )
              if data is not None:
                  req.data = json.dumps(data).encode("utf-8")
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8")
                  return json.loads(body)

          # Get zone ID
          zones = api_call(
              "GET",
              f"https://api.cloudflare.com/client/v4/zones?name={ZONE_NAME}",
          )
          if not zones.get("success") or not zones.get("result"):
              raise RuntimeError(f"Failed to find zone {ZONE_NAME}: {zones}")
          zone_id = zones["result"][0]["id"]
          print(f"Zone ID: {zone_id}")

          # Create/update Pages projects (skip if already exists)
          for project_name, _ in PROJECTS:
              get_url = f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT_ID}/pages/projects/{project_name}"
              get_result = api_call("GET", get_url)
              if get_result.get("success"):
                  print(f"Pages project {project_name} already exists")
                  continue
              url = f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT_ID}/pages/projects"
              result = api_call(
                  "POST",
                  url,
                  {"name": project_name, "production_branch": "main"},
              )
              if result.get("success"):
                  print(f"Created Pages project {project_name}")
              else:
                  raise RuntimeError(f"Failed to create {project_name}: {result}")

          # Create DNS CNAME records; delete any existing records for the same name first
          for project_name, subdomain in PROJECTS:
              target = f"{project_name}.pages.dev"
              records = api_call(
                  "GET",
                  f"https://api.cloudflare.com/client/v4/zones/{zone_id}/dns_records?name={subdomain}.{ZONE_NAME}",
              )
              if records.get("success") and records.get("result"):
                  for rec in records["result"]:
                      api_call(
                          "DELETE",
                          f"https://api.cloudflare.com/client/v4/zones/{zone_id}/dns_records/{rec['id']}",
                      )
                  print(f"Deleted existing DNS records for {subdomain}.{ZONE_NAME}")
              data = {
                  "type": "CNAME",
                  "name": subdomain,
                  "content": target,
                  "proxied": True,
              }
              result = api_call(
                  "POST",
                  f"https://api.cloudflare.com/client/v4/zones/{zone_id}/dns_records",
                  data,
              )
              if not result.get("success"):
                  raise RuntimeError(f"Failed to set DNS for {subdomain}: {result}")
              print(f"Created DNS {subdomain}.{ZONE_NAME} -> {target}")

          # Add custom domains to Pages projects
          for project_name, subdomain in PROJECTS:
              domain = f"{subdomain}.{ZONE_NAME}"
              result = api_call(
                  "POST",
                  f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT_ID}/pages/projects/{project_name}/domains",
                  {"name": domain},
              )
              if result.get("success"):
                  print(f"Added custom domain {domain} to {project_name}")
              elif result.get("errors") and any(
                  "already exists" in (e.get("message") or "").lower() for e in result["errors"]
              ):
                  print(f"Custom domain {domain} already exists in {project_name}")
              else:
                  raise RuntimeError(f"Failed to add custom domain {domain}: {result}")

          # Setup apex domain: CNAME flattening to www Pages project + custom domain
          target = f"{APEX_PROJECT}.pages.dev"
          # Remove any conflicting apex records (A/AAAA/CNAME) before adding the CNAME.
          # Keep MX/TXT/etc. intact.
          apex_records = api_call(
              "GET",
              f"https://api.cloudflare.com/client/v4/zones/{zone_id}/dns_records?name={APEX_DOMAIN}",
          )
          if apex_records.get("success") and apex_records.get("result"):
              for rec in apex_records["result"]:
                  if rec["type"] in ("A", "AAAA", "CNAME"):
                      api_call(
                          "DELETE",
                          f"https://api.cloudflare.com/client/v4/zones/{zone_id}/dns_records/{rec['id']}",
                      )
                      print(f"Deleted existing apex {rec['type']} record for {APEX_DOMAIN}")
          data = {
              "type": "CNAME",
              "name": "@",
              "content": target,
              "proxied": True,
          }
          result = api_call(
              "POST",
              f"https://api.cloudflare.com/client/v4/zones/{zone_id}/dns_records",
              data,
          )
          if not result.get("success"):
              raise RuntimeError(f"Failed to set apex DNS for {APEX_DOMAIN}: {result}")
          print(f"Created apex DNS {APEX_DOMAIN} -> {target}")

          apex_domain_result = api_call(
              "POST",
              f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT_ID}/pages/projects/{APEX_PROJECT}/domains",
              {"name": APEX_DOMAIN},
          )
          if apex_domain_result.get("success"):
              print(f"Added custom domain {APEX_DOMAIN} to {APEX_PROJECT}")
          elif apex_domain_result.get("errors") and any(
              "already exists" in (e.get("message") or "").lower() for e in apex_domain_result["errors"]
          ):
              print(f"Custom domain {APEX_DOMAIN} already exists in {APEX_PROJECT}")
          else:
              raise RuntimeError(f"Failed to add apex custom domain {APEX_DOMAIN}: {apex_domain_result}")
          PY
