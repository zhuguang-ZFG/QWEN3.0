name: Deploy Next.js Site

on:
  push:
    branches: [main]
    paths:
      - "donglicao-site-v2/**"
      - ".github/workflows/deploy-site-v2.yml"
  workflow_dispatch:

concurrency:
  group: deploy-site-v2
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: donglicao-site-v2/package-lock.json

      - name: Impeccable design check
        working-directory: donglicao-site-v2
        run: npx impeccable@latest detect .

      - name: Install dependencies and build
        working-directory: donglicao-site-v2
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy donglicao-site-v2/dist --project-name=lima-www --branch=main

      - name: Smoke test (Pages dev + custom domain)
        run: |
          for url in https://lima-www.pages.dev/ https://www.donglicao.com/; do
            for i in {1..12}; do
              echo "Checking $url (attempt $i)..."
              if curl -sf --max-time 10 "$url" -o /dev/null; then
                echo "$url OK"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "$url failed after 12 attempts"
                exit 1
              fi
              sleep 5
            done
          done
          echo "site-v2 Pages deploy OK"
