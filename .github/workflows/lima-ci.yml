name: LiMa CI

on:
  push:
    branches:
      - main
      - master
      - codex/**
  pull_request:

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_server.txt
          pip install pytest pytest-asyncio

      - name: Run test suite
        run: python -m pytest -q

  rag-gate:
    name: RAG offline eval gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_server.txt
          pip install pytest pytest-asyncio

      - name: Run RAG fixture gate
        run: python scripts/run_rag_eval_gate.py

      - name: Run RAG gate pytest marker
        run: python -m pytest -q -m rag_gate
