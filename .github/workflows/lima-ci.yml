name: LiMa CI

on:
  push:
    branches:
      - main
      - master
      - codex/**
  pull_request:

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_server.txt
          pip install pytest pytest-asyncio pytest-xdist pytest-cov ruff pip-audit hypothesis

      - name: Lint (ruff)
        run: python scripts/run_ruff_check.py

      - name: Run test suite (parallel + coverage)
        run: python scripts/run_pytest_ci.py

      - name: Dead code scan (vulture, report-only)
        run: |
          pip install vulture
          python scripts/run_vulture.py --report-only

      - name: Dependency usage scan (deptry, report-only)
        run: |
          pip install deptry
          python scripts/run_deptry.py

      - name: Complexity scan (radon, report-only)
        run: |
          pip install radon
          python scripts/run_radon.py --report-only

      - name: Type check (pyright)
        run: |
          pip install pyright
          python scripts/run_pyright.py

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Secret scan (gitleaks)
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner

      - name: Dependency audit (pip-audit)
        run: python scripts/run_pip_audit.py

      - name: Install osv-scanner
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/download/v2.0.3/osv-scanner_linux_amd64 \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: Dependency audit (osv-scanner)
        run: python scripts/run_osv_scan.py

      - name: Install trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.63.0

      - name: Container scan (trivy, report-only)
        run: python scripts/run_trivy.py --report-only

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: SBOM scan (syft, report-only)
        run: python scripts/run_syft.py --report-only

      - name: Install grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Vulnerability scan (grype, report-only)
        run: python scripts/run_grype.py --report-only

  rag-gate:
    name: RAG offline eval gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_server.txt
          pip install pytest pytest-asyncio

      - name: Run RAG fixture gate
        run: python scripts/run_rag_eval_gate.py

      - name: Run RAG gate pytest marker
        run: python -m pytest -q -m rag_gate

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            python scripts/ci_notify.py "CI passed" "LiMa CI on ${GITHUB_REF_NAME}"
          else
            python scripts/ci_notify.py "CI FAILED" "LiMa CI on ${GITHUB_REF_NAME}" --status failure
          fi
