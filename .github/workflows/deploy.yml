name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "*.py,routes/,agent_runtime/,context_pipeline/,fleet/,routing_ml/,skills/,config/"
          target: /opt/lima-router
          strip_components: 0

      - name: Restart and health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: false
          script: |
            echo ">> Stopping lima-router..."
            systemctl stop lima-router 2>/dev/null || true
            sleep 3
            systemctl start lima-router
            sleep 10

            echo ">> Waiting for health check..."
            for i in $(seq 1 20); do
              if curl -sf "http://127.0.0.1:8080/health" > /dev/null 2>&1; then
                echo ">> Health OK after ${i}s"
                exit 0
              fi
              sleep 3
            done

            echo ">> Health check FAILED — checking logs"
            journalctl -u lima-router --no-pager -n 10 || true
            exit 1

      - name: Notify Telegram (success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode=HTML \
            -d text="<b>LiMa Deploy OK</b>%0ACommit: <code>${{ github.sha }}</code>%0ABy: ${{ github.actor }}"

      - name: Notify Telegram (failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode=HTML \
            -d text="<b>LiMa Deploy FAILED</b>%0ACommit: <code>${{ github.sha }}</code>%0APlease check GitHub Actions logs."
