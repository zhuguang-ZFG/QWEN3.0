name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # AUDIT-7-D2：生产部署环境保护。需在 GitHub repo Settings → Environments → production
    # 配置 required reviewers / wait timer，防止误合并直接 SSH 进生产。
    environment: production
    env:
      VPS_SSH_KEY_SET: ${{ secrets.VPS_SSH_KEY != '' }}
      VPS_HOST_SET: ${{ secrets.VPS_HOST != '' }}
      LIMA_API_KEY_SET: ${{ secrets.LIMA_API_KEY != '' }}
      JDCLOUD_HOST_SET: ${{ secrets.JDCLOUD_HOST != '' }}

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install deploy dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_server.txt

      - name: Write deploy key
        run: |
          if [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
            mkdir -p ~/.ssh
            printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
            chmod 600 ~/.ssh/id_ed25519
          else
            echo "WARNING: secrets.VPS_SSH_KEY is not set; deploy will fall back to password if LIMA_DEPLOY_PASS is configured"
          fi

      - name: Deploy Aliyun primary (LiMa Router)
        timeout-minutes: 15
        env:
          LIMA_DEPLOY_KEY_PATH: ~/.ssh/id_ed25519
          LIMA_DEPLOY_KNOWN_HOSTS: ~/.ssh/known_hosts
          LIMA_DEPLOY_PASS: ${{ secrets.LIMA_DEPLOY_PASS }}
        run: |
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          files=$(git diff --name-only --diff-filter=ACMRT HEAD~1 HEAD -- \
            ':!docs/*' ':!tests/*' ':!.github/*' ':!*.md' ':!*.log' ':!*.db' ':!*.sqlite3' \
            '*.py' '*.pyi' '*.html' '*.js' '*.css' '*.json' '*.txt' '*.toml' '*.yaml' '*.yml' '*.svg' '*.png' '*.jpg' | tr '\n' ' ')
          if [ -n "$files" ]; then
            echo "Deploying changed runtime files: $files"
            python scripts/deploy_unified.py --files $files
          else
            echo "No runtime files changed; skipping core deploy"
          fi

      - name: Deploy Chat Web static files
        if: env.VPS_SSH_KEY_SET == 'true' && env.VPS_HOST_SET == 'true'
        timeout-minutes: 5
        env:
          LIMA_DEPLOY_HOST: root@${{ secrets.VPS_HOST }}
        run: python scripts/deploy_chat_web.py

      - name: Verify production deployment
        if: env.LIMA_API_KEY_SET == 'true'
        timeout-minutes: 5
        env:
          LIMA_API_KEY: ${{ secrets.LIMA_API_KEY }}
        run: python scripts/verify_production_deploy.py

      - name: Deploy JDCloud provider probe
        if: env.JDCLOUD_HOST_SET == 'true'
        timeout-minutes: 10
        env:
          LIMA_DEPLOY_KEY_PATH: ~/.ssh/id_ed25519
          LIMA_DEPLOY_KNOWN_HOSTS: ~/.ssh/known_hosts
          LIMA_DEPLOY_PASS: ${{ secrets.LIMA_DEPLOY_PASS }}
          LIMA_JDCLOUD_SERVER: ${{ secrets.JDCLOUD_HOST }}
          JDCLOUD_HOST: ${{ secrets.JDCLOUD_HOST }}
        run: |
          host="${LIMA_JDCLOUD_SERVER}"
          if [ -z "$host" ]; then echo "ERROR: LIMA_JDCLOUD_SERVER or JDCLOUD_HOST secret must be set"; exit 1; fi
          ssh-keyscan -H "$host" >> ~/.ssh/known_hosts
          python scripts/deploy_jdcloud_probe.py
