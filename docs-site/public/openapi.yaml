openapi: 3.0.3
info:
  title: LiMa
  description: LiMa public API surface for chat, image generation, and device-app integration.
  version: '1.3'
  license:
    name: Proprietary
    url: https://donglicao.com
paths:
  /device/v1/app/assets:
    get:
      tags:
      - device-app-assets
      summary: List Assets
      parameters:
      - name: category
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Category
        example: example_category
      - name: tag
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Tag
        example: example_tag
      - name: difficulty
        in: query
        required: false
        schema:
          type: string
          default: ''
          title: Difficulty
        example: example_difficulty
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Limit
        example: 20
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
        example: 0
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
        example: Bearer lima_api_token
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                assets:
                - id: ast-00000000-0000-0000-0000-000000000001
                  title: Cat line art
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      operationId: get_device_v1_app_assets
    post:
      tags:
      - device-app-assets
      summary: Create Asset
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                id: ast-00000000-0000-0000-0000-000000000001
                title: Cat line art
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      requestBody:
        content:
          application/json:
            example:
              title: Cat line art
              prompt: A cute cat
              category: animal
      operationId: post_device_v1_app_assets
  /device/v1/app/assets/{asset_id}:
    get:
      tags:
      - device-app-assets
      summary: Get Asset
      parameters:
      - name: asset_id
        in: path
        required: true
        schema:
          type: string
          title: Asset Id
        example: ast-00000000-0000-0000-0000-000000000001
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
        example: Bearer lima_api_token
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                id: ast-00000000-0000-0000-0000-000000000001
                title: Cat line art
                prompt: A cute cat
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      operationId: get_device_v1_app_assets_asset_id
  /device/v1/app/assets/{asset_id}/render:
    post:
      tags:
      - device-app-assets
      summary: Render Asset
      parameters:
      - name: asset_id
        in: path
        required: true
        schema:
          type: string
          title: Asset Id
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                render_id: rnd-00000000-0000-0000-0000-000000000001
                status: queued
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      requestBody:
        content:
          application/json:
            example:
              device_id: dev-00000000-0000-0000-0000-000000000001
      operationId: post_device_v1_app_assets_asset_id_render
  /device/v1/app/auth/account/delete:
    post:
      tags:
      - device-app-auth
      summary: Delete Account
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                success: true
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      requestBody:
        content:
          application/json:
            example:
              password: your-password
      operationId: post_device_v1_app_auth_account_delete
  /device/v1/app/auth/captcha:
    get:
      tags:
      - device-app-auth
      summary: Get Captcha
      description: 返回 PNG 图形验证码。
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                captcha_id: cap-00000000-0000-0000-0000-000000000001
                image_url: https://example/captcha.png
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      parameters:
      - name: width
        in: query
        required: false
        schema:
          type: integer
          default: 120
          title: Width
        example: 120
      operationId: get_device_v1_app_auth_captcha
      security: []
  /device/v1/app/auth/change-password:
    put:
      tags:
      - device-app-auth
      summary: Change Password
      description: 修改当前账户密码。
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                success: true
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      requestBody:
        content:
          application/json:
            example:
              old_password: old
              new_password: new
      operationId: put_device_v1_app_auth_change_password
  /device/v1/app/auth/login:
    post:
      tags:
      - device-app-auth
      summary: Login
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                access_token: tok-00000000-0000-0000-0000-000000000001
                token_type: bearer
                expires_in: 3600
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      parameters: []
      requestBody:
        content:
          application/json:
            example:
              phone: +86-13800000000
              password: your-password
              captcha_id: cap-00000000-0000-0000-0000-000000000001
              captcha_code: '1234'
      operationId: post_device_v1_app_auth_login
      security: []
  /device/v1/app/auth/me:
    get:
      tags:
      - device-app-auth
      summary: Get Me
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
        example: Bearer lima_api_token
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                id: usr-00000000-0000-0000-0000-000000000001
                phone: +86-13800000000
                nickname: User
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      operationId: get_device_v1_app_auth_me
  /device/v1/app/auth/register:
    post:
      tags:
      - device-app-auth
      summary: Register
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                id: usr-00000000-0000-0000-0000-000000000001
                message: registered
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      parameters: []
      requestBody:
        content:
          application/json:
            example:
              phone: +86-13800000000
              password: your-password
              sms_code: '123456'
      operationId: post_device_v1_app_auth_register
      security: []
  /device/v1/app/auth/sms-verification:
    post:
      tags:
      - device-app-auth
      summary: Sms Verification
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                success: true
                message: code sent
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      parameters: []
      requestBody:
        content:
          application/json:
            example:
              phone: +86-13800000000
              purpose: register
      operationId: post_device_v1_app_auth_sms_verification
  /device/v1/app/chat-sessions/{session_id}:
    delete:
      tags:
      - device-app-chat
      summary: Delete Chat Session
      description: Soft-delete a chat session if the caller owns it.
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
        example: sess-00000000-0000-0000-0000-000000000001
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
        example: Bearer lima_api_token
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                deleted: true
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      operationId: delete_device_v1_app_chat_sessions_session_id
  /device/v1/app/devices/{device_id}/share:
    post:
      tags:
      - device-app
      - device-app-sharing
      summary: Create Share
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                share_token: shr-00000000-0000-0000-0000-000000000001
                status: active
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      requestBody:
        content:
          application/json:
            example:
              role: viewer
      operationId: post_device_v1_app_devices_device_id_share
  /device/v1/app/devices/{device_id}/share/revoke:
    post:
      tags:
      - device-app
      - device-app-sharing
      summary: Revoke Share
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                revoked: true
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      operationId: post_device_v1_app_devices_device_id_share_revoke
  /device/v1/app/devices/{device_id}/shares:
    get:
      tags:
      - device-app
      - device-app-sharing
      summary: List Shares
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
        example: dev-00000000-0000-0000-0000-000000000001
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
        example: Bearer lima_api_token
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                shares:
                - token: shr-00000000-0000-0000-0000-000000000001
                  role: viewer
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      operationId: get_device_v1_app_devices_device_id_shares
  /device/v1/app/shares/{share_token}/accept:
    post:
      tags:
      - device-app
      - device-app-sharing
      summary: Accept Share
      parameters:
      - name: share_token
        in: path
        required: true
        schema:
          type: string
          title: Share Token
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                share_token: shr-00000000-0000-0000-0000-000000000001
                status: accepted
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      operationId: post_device_v1_app_shares_share_token_accept
  /device/v1/app/devices:
    get:
      tags:
      - device-app
      summary: List Devices
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
        example: Bearer lima_api_token
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                items:
                - id: dev-00000000-0000-0000-0000-000000000001
                  name: Living Room
                  model: LiMa-Draw-V1
                  online: true
                total: 1
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      operationId: get_device_v1_app_devices
  /device/v1/app/devices/batch-draw:
    post:
      tags:
      - device-app-tasks
      summary: Batch Draw
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                task_id: tsk-00000000-0000-0000-0000-000000000001
                queued: true
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      requestBody:
        content:
          application/json:
            example:
              device_ids:
              - dev-00000000-0000-0000-0000-000000000001
              prompt: a cat
      operationId: post_device_v1_app_devices_batch_draw
  /device/v1/app/devices/bind:
    post:
      tags:
      - device-app
      summary: Bind Device
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                device_id: dev-00000000-0000-0000-0000-000000000001
                bound: true
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      requestBody:
        content:
          application/json:
            example:
              device_id: dev-00000000-0000-0000-0000-000000000001
              bind_code: '123456'
      operationId: post_device_v1_app_devices_bind
  /device/v1/app/devices/discover:
    post:
      tags:
      - device-app-discovery
      summary: Discover Devices
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                devices:
                - id: dev-00000000-0000-0000-0000-000000000001
                  name: LiMa-Draw-V1
                  rssi: -45
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      requestBody:
        content:
          application/json:
            example:
              timeout: 10
      operationId: post_device_v1_app_devices_discover
  /device/v1/app/devices/manual-add:
    post:
      tags:
      - device-app
      summary: Manual Add Device
      description: 管理员手动添加设备（无需激活码）。
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                device_id: dev-00000000-0000-0000-0000-000000000001
                added: true
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      requestBody:
        content:
          application/json:
            example:
              device_id: dev-00000000-0000-0000-0000-000000000001
              name: Living Room
      operationId: post_device_v1_app_devices_manual_add
  /device/v1/app/devices/pair:
    post:
      tags:
      - device-app-discovery
      summary: Create Pair
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                pairing_token: pair-00000000-0000-0000-0000-000000000001
                expires_in: 300
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      requestBody:
        content:
          application/json:
            example:
              device_id: dev-00000000-0000-0000-0000-000000000001
      operationId: post_device_v1_app_devices_pair
  /device/v1/app/devices/pair/confirm:
    post:
      tags:
      - device-app-discovery
      summary: Confirm Pair
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                paired: true
                device_id: dev-00000000-0000-0000-0000-000000000001
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      parameters: []
      requestBody:
        content:
          application/json:
            example:
              pairing_token: pair-00000000-0000-0000-0000-000000000001
              code: '123456'
      operationId: post_device_v1_app_devices_pair_confirm
  /device/v1/app/devices/provision:
    post:
      tags:
      - device-app-misc
      summary: Create Provision
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                provision_token: prv-00000000-0000-0000-0000-000000000001
                expires_in: 300
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      requestBody:
        content:
          application/json:
            example:
              device_id: dev-00000000-0000-0000-0000-000000000001
      operationId: post_device_v1_app_devices_provision
  /device/v1/app/devices/provision/confirm:
    post:
      tags:
      - device-app-misc
      summary: Confirm Provision
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                provisioned: true
                device_id: dev-00000000-0000-0000-0000-000000000001
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      parameters: []
      requestBody:
        content:
          application/json:
            example:
              provision_token: prv-00000000-0000-0000-0000-000000000001
              code: '123456'
      operationId: post_device_v1_app_devices_provision_confirm
  /device/v1/app/devices/register:
    post:
      tags:
      - device-app
      summary: Register Device
      parameters:
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                device_id: dev-00000000-0000-0000-0000-000000000001
                registered: true
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      requestBody:
        content:
          application/json:
            example:
              model: LiMa-Draw-V1
              sn: SN123456
      operationId: post_device_v1_app_devices_register
  /device/v1/app/devices/{device_id}:
    get:
      tags:
      - device-app
      summary: Get Device
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
        example: dev-00000000-0000-0000-0000-000000000001
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
        example: Bearer lima_api_token
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                id: dev-00000000-0000-0000-0000-000000000001
                name: Living Room
                model: LiMa-Draw-V1
                online: true
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      operationId: get_device_v1_app_devices_device_id
    put:
      tags:
      - device-app
      summary: Update Device
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
          title: Authorization
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                id: dev-00000000-0000-0000-0000-000000000001
                name: Living Room
                updated: true
        '400':
          description: 请求参数错误或未通过验证
        '401':
          description: 认证失败或 Token 无效
      requestBody:
        content:
          application/json:
            example:
              name: Living Room
              settings: {}
      operationId: put_device_v1_app_devices_device_id
  /device/v1/app/devices/{device_id}/activity:
    get:
      tags:
      - device-app-activity
      summary: Get Device Activity
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
        example: dev-00000000-0000-0000-0000-000000000001
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          default: 100
          title: Limit
        example: 100
      - name: authorization
        in: header
        required: false
        schema:
          type: string
          default: ''
