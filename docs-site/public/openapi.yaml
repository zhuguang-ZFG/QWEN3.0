openapi: 3.0.3
info: {title: LiMa, description: 'LiMa public API surface for chat, image generation, and device-app integration.', version: '1.3'}
paths:
  /device/v1/app/assets:
    get:
      tags: [device-app-assets]
      summary: List Assets
      parameters: [{name: category, in: query, required: false, schema: {type: string, default: '', title: Category}, example: example_category}, {name: tag, in: query, required: false, schema: {type: string, default: '', title: Tag}, example: example_tag}, {name: difficulty, in: query, required: false, schema: {type: string, default: '', title: Difficulty}, example: example_difficulty}, {name: limit, in: query, required: false, schema: {type: integer, maximum: 100, minimum: 1, default: 20, title: Limit},
          example: 20}, {name: offset, in: query, required: false, schema: {type: integer, minimum: 0, default: 0, title: Offset}, example: 0}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                assets:
                - {id: ast-00000000-0000-0000-0000-000000000001, title: Cat line art}
    post:
      tags: [device-app-assets]
      summary: Create Asset
      parameters: [{name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {id: ast-00000000-0000-0000-0000-000000000001, title: Cat line art}
      requestBody:
        content:
          application/json:
            example: {title: Cat line art, prompt: A cute cat, category: animal}
  /device/v1/app/assets/{asset_id}:
    get:
      tags: [device-app-assets]
      summary: Get Asset
      parameters: [{name: asset_id, in: path, required: true, schema: {type: string, title: Asset Id}, example: ast-00000000-0000-0000-0000-000000000001}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {id: ast-00000000-0000-0000-0000-000000000001, title: Cat line art, prompt: A cute cat}
  /device/v1/app/assets/{asset_id}/render:
    post:
      tags: [device-app-assets]
      summary: Render Asset
      parameters: [{name: asset_id, in: path, required: true, schema: {type: string, title: Asset Id}}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {render_id: rnd-00000000-0000-0000-0000-000000000001, status: queued}
      requestBody:
        content:
          application/json:
            example: {device_id: dev-00000000-0000-0000-0000-000000000001}
  /device/v1/app/auth/account/delete:
    post:
      tags: [device-app-auth]
      summary: Delete Account
      parameters: [{name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {success: true}
      requestBody:
        content:
          application/json:
            example: {password: your-password}
  /device/v1/app/auth/captcha:
    get:
      tags: [device-app-auth]
      summary: Get Captcha
      description: 返回 PNG 图形验证码。
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {captcha_id: cap-00000000-0000-0000-0000-000000000001, image_url: 'https://example/captcha.png'}
      parameters: [{name: width, in: query, required: false, schema: {type: integer, default: 120, title: Width}, example: 120}]
  /device/v1/app/auth/change-password:
    put:
      tags: [device-app-auth]
      summary: Change Password
      description: 修改当前账户密码。
      parameters: [{name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {success: true}
      requestBody:
        content:
          application/json:
            example: {old_password: old, new_password: new}
  /device/v1/app/auth/login:
    post:
      tags: [device-app-auth]
      summary: Login
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {access_token: tok-00000000-0000-0000-0000-000000000001, token_type: bearer, expires_in: 3600}
      parameters: []
      requestBody:
        content:
          application/json:
            example: {phone: +86-13800000000, password: your-password, captcha_id: cap-00000000-0000-0000-0000-000000000001, captcha_code: '1234'}
  /device/v1/app/auth/me:
    get:
      tags: [device-app-auth]
      summary: Get Me
      parameters: [{name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {id: usr-00000000-0000-0000-0000-000000000001, phone: +86-13800000000, nickname: User}
  /device/v1/app/auth/register:
    post:
      tags: [device-app-auth]
      summary: Register
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {id: usr-00000000-0000-0000-0000-000000000001, message: registered}
      parameters: []
      requestBody:
        content:
          application/json:
            example: {phone: +86-13800000000, password: your-password, sms_code: '123456'}
  /device/v1/app/auth/sms-verification:
    post:
      tags: [device-app-auth]
      summary: Sms Verification
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {success: true, message: code sent}
      parameters: []
      requestBody:
        content:
          application/json:
            example: {phone: +86-13800000000, purpose: register}
  /device/v1/app/chat-sessions/{session_id}:
    delete:
      tags: [device-app-chat]
      summary: Delete Chat Session
      description: Soft-delete a chat session if the caller owns it.
      parameters: [{name: session_id, in: path, required: true, schema: {type: string, title: Session Id}, example: sess-00000000-0000-0000-0000-000000000001}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {deleted: true}
  /device/v1/app/devices/{device_id}/share:
    post:
      tags: [device-app, device-app-sharing]
      summary: Create Share
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {share_token: shr-00000000-0000-0000-0000-000000000001, status: active}
      requestBody:
        content:
          application/json:
            example: {role: viewer}
  /device/v1/app/devices/{device_id}/share/revoke:
    post:
      tags: [device-app, device-app-sharing]
      summary: Revoke Share
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {revoked: true}
  /device/v1/app/devices/{device_id}/shares:
    get:
      tags: [device-app, device-app-sharing]
      summary: List Shares
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}, example: dev-00000000-0000-0000-0000-000000000001}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                shares:
                - {token: shr-00000000-0000-0000-0000-000000000001, role: viewer}
  /device/v1/app/shares/{share_token}/accept:
    post:
      tags: [device-app, device-app-sharing]
      summary: Accept Share
      parameters: [{name: share_token, in: path, required: true, schema: {type: string, title: Share Token}}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {share_token: shr-00000000-0000-0000-0000-000000000001, status: accepted}
  /device/v1/app/devices:
    get:
      tags: [device-app]
      summary: List Devices
      parameters: [{name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                items:
                - {id: dev-00000000-0000-0000-0000-000000000001, name: Living Room, model: LiMa-Draw-V1, online: true}
                total: 1
  /device/v1/app/devices/batch-draw:
    post:
      tags: [device-app-tasks]
      summary: Batch Draw
      parameters: [{name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {task_id: tsk-00000000-0000-0000-0000-000000000001, queued: true}
      requestBody:
        content:
          application/json:
            example:
              device_ids: [dev-00000000-0000-0000-0000-000000000001]
              prompt: a cat
  /device/v1/app/devices/bind:
    post:
      tags: [device-app]
      summary: Bind Device
      parameters: [{name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {device_id: dev-00000000-0000-0000-0000-000000000001, bound: true}
      requestBody:
        content:
          application/json:
            example: {device_id: dev-00000000-0000-0000-0000-000000000001, bind_code: '123456'}
  /device/v1/app/devices/discover:
    post:
      tags: [device-app-discovery]
      summary: Discover Devices
      parameters: [{name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                devices:
                - {id: dev-00000000-0000-0000-0000-000000000001, name: LiMa-Draw-V1, rssi: -45}
      requestBody:
        content:
          application/json:
            example: {timeout: 10}
  /device/v1/app/devices/manual-add:
    post:
      tags: [device-app]
      summary: Manual Add Device
      description: 管理员手动添加设备（无需激活码）。
      parameters: [{name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {device_id: dev-00000000-0000-0000-0000-000000000001, added: true}
      requestBody:
        content:
          application/json:
            example: {device_id: dev-00000000-0000-0000-0000-000000000001, name: Living Room}
  /device/v1/app/devices/pair:
    post:
      tags: [device-app-discovery]
      summary: Create Pair
      parameters: [{name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {pairing_token: pair-00000000-0000-0000-0000-000000000001, expires_in: 300}
      requestBody:
        content:
          application/json:
            example: {device_id: dev-00000000-0000-0000-0000-000000000001}
  /device/v1/app/devices/pair/confirm:
    post:
      tags: [device-app-discovery]
      summary: Confirm Pair
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {paired: true, device_id: dev-00000000-0000-0000-0000-000000000001}
      parameters: []
      requestBody:
        content:
          application/json:
            example: {pairing_token: pair-00000000-0000-0000-0000-000000000001, code: '123456'}
  /device/v1/app/devices/provision:
    post:
      tags: [device-app-misc]
      summary: Create Provision
      parameters: [{name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {provision_token: prv-00000000-0000-0000-0000-000000000001, expires_in: 300}
      requestBody:
        content:
          application/json:
            example: {device_id: dev-00000000-0000-0000-0000-000000000001}
  /device/v1/app/devices/provision/confirm:
    post:
      tags: [device-app-misc]
      summary: Confirm Provision
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {provisioned: true, device_id: dev-00000000-0000-0000-0000-000000000001}
      parameters: []
      requestBody:
        content:
          application/json:
            example: {provision_token: prv-00000000-0000-0000-0000-000000000001, code: '123456'}
  /device/v1/app/devices/register:
    post:
      tags: [device-app]
      summary: Register Device
      parameters: [{name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {device_id: dev-00000000-0000-0000-0000-000000000001, registered: true}
      requestBody:
        content:
          application/json:
            example: {model: LiMa-Draw-V1, sn: SN123456}
  /device/v1/app/devices/{device_id}:
    get:
      tags: [device-app]
      summary: Get Device
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}, example: dev-00000000-0000-0000-0000-000000000001}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {id: dev-00000000-0000-0000-0000-000000000001, name: Living Room, model: LiMa-Draw-V1, online: true}
    put:
      tags: [device-app]
      summary: Update Device
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {id: dev-00000000-0000-0000-0000-000000000001, name: Living Room, updated: true}
      requestBody:
        content:
          application/json:
            example:
              name: Living Room
              settings: {}
  /device/v1/app/devices/{device_id}/activity:
    get:
      tags: [device-app-activity]
      summary: Get Device Activity
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}, example: dev-00000000-0000-0000-0000-000000000001}, {name: limit, in: query, required: false, schema: {type: integer, maximum: 1000, minimum: 1, default: 100, title: Limit}, example: 100}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                activities:
                - {time: '2024-01-01T00:00:00Z', event: draw_done}
  /device/v1/app/devices/{device_id}/audio/{audio_id}:
    get:
      tags: [device-app-chat]
      summary: Get Audio Info
      description: Return metadata for an audio recording tied to a device.
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}, example: dev-00000000-0000-0000-0000-000000000001}, {name: audio_id, in: path, required: true, schema: {type: string, title: Audio Id}, example: aud-00000000-0000-0000-0000-000000000001}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {audio_id: aud-00000000-0000-0000-0000-000000000001, url: 'https://example/audio.mp3'}
  /device/v1/app/devices/{device_id}/batch-tasks:
    post:
      tags: [device-app-task-extras]
      summary: Create Batch Tasks
      description: Create up to 20 tasks in a single batch and enqueue them.
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {task_id: tsk-00000000-0000-0000-0000-000000000001, queued: true}
      requestBody:
        content:
          application/json:
            example:
              tasks:
              - {type: draw, prompt: a cat}
  /device/v1/app/devices/{device_id}/chat-history:
    get:
      tags: [device-app-chat]
      summary: List Chat History
      description: List user messages that have an associated audio_id (for voiceprint selection).
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}, example: dev-00000000-0000-0000-0000-000000000001}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                messages:
                - {role: user, content: Hi}
  /device/v1/app/devices/{device_id}/chat-sessions:
    post:
      tags: [device-app-chat]
      summary: Create Chat Session
      description: Create a chat session for a device.
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {id: sess-00000000-0000-0000-0000-000000000001, title: New chat}
      requestBody:
        content:
          application/json:
            example: {title: New chat}
    get:
      tags: [device-app-chat]
      summary: List Chat Sessions
      description: List active chat sessions for a device.
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}, example: dev-00000000-0000-0000-0000-000000000001}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                sessions:
                - {id: sess-00000000-0000-0000-0000-000000000001, title: New chat}
  /device/v1/app/devices/{device_id}/chat-sessions/{session_id}/messages:
    get:
      tags: [device-app-chat]
      summary: Get Chat Messages
      description: Get paginated messages for a chat session.
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}, example: dev-00000000-0000-0000-0000-000000000001}, {name: session_id, in: path, required: true, schema: {type: string, title: Session Id}, example: sess-00000000-0000-0000-0000-000000000001}, {name: limit, in: query, required: false, schema: {type: integer, maximum: 200, minimum: 1, default: 50, title: Limit}, example: 50}, {name: offset, in: query, required: false, schema: {type: integer, minimum: 0,
            default: 0, title: Offset}, example: 0}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                messages:
                - {role: user, content: Hi}
  /device/v1/app/devices/{device_id}/members:
    get:
      tags: [device-app-members]
      summary: List Members
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}, example: dev-00000000-0000-0000-0000-000000000001}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                members:
                - {id: usr-00000000-0000-0000-0000-000000000001, role: owner}
  /device/v1/app/devices/{device_id}/self-checks:
    get:
      tags: [device-app-misc]
      summary: List Self Checks
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}, example: dev-00000000-0000-0000-0000-000000000001}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                checks:
                - {name: pen, status: ok}
  /device/v1/app/devices/{device_id}/stats:
    get:
      tags: [device-app-stats]
      summary: Device Stats
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}, example: dev-00000000-0000-0000-0000-000000000001}, {name: period, in: query, required: false, schema: {type: string, pattern: ^(7d|30d|90d)$, default: 7d, title: Period}, example: 7d}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {device_id: dev-00000000-0000-0000-0000-000000000001, tasks_total: 42, tasks_today: 3}
  /device/v1/app/devices/{device_id}/status:
    get:
      tags: [device-app]
      summary: Get Device Status
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}, example: dev-00000000-0000-0000-0000-000000000001}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {device_id: dev-00000000-0000-0000-0000-000000000001, status: online, battery: 87}
  /device/v1/app/devices/{device_id}/supplies:
    put:
      tags: [device-app-misc]
      summary: Update Supplies
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {device_id: dev-00000000-0000-0000-0000-000000000001, updated: true}
      requestBody:
        content:
          application/json:
            example: {ink: 100, paper: 100}
    get:
      tags: [device-app-misc]
      summary: Get Supplies
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}, example: dev-00000000-0000-0000-0000-000000000001}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}, example: Bearer lima_api_token}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {device_id: dev-00000000-0000-0000-0000-000000000001, ink: 80, paper: 65}
  /device/v1/app/devices/{device_id}/tasks:
    post:
      tags: [device-app-tasks]
      summary: Create Task
      parameters: [{name: device_id, in: path, required: true, schema: {type: string, title: Device Id}}, {name: authorization, in: header, required: false, schema: {type: string, default: '', title: Authorization}}]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example: {task_id: tsk-00000000-0000-0000-0000-000000000001, queued: true}
      requestBody:
        content:
          application/json:
            example: {type: draw, prompt: a cat}
  /device/v1/app/devices/{device_id}/transfer:
    post:
      tags: [device-app-misc]
      summary: Request Transfer
