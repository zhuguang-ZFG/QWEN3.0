target-version = "py310"
line-length = 120

exclude = [
    "esp32S_XYZ",
    "scripts/archive",
    "venv",
    ".venv",
    "managed_components",
    ".ruff_cache",
]

[lint]
# Gate real defects first; broaden cleanup-only rules in later slices.
select = ["E9", "F821", "F822", "F823", "B005", "B011", "B012", "B905", "S507"]

[lint.per-file-ignores]
"**/__init__.py" = ["F401"]
"http_caller.py" = ["F401"]
"backends.py" = ["F401"]
"routing_engine.py" = ["F401"]
