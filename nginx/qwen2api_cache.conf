# qwen2API Nginx 缓存配置
# 文件位置: nginx/conf/qwen2api_cache.conf

# 缓存路径配置
proxy_cache_path cache/qwen2api
    levels=1:2
    keys_zone=qwen_cache:100m
    max_size=1g
    inactive=24h
    use_temp_path=off;

# 上游服务器
upstream qwen2api_backend {
    server 127.0.0.1:7862;
    keepalive 32;
}

server {
    listen 7864;
    server_name localhost;

    # 日志
    access_log logs/qwen2api_access.log;
    error_log logs/qwen2api_error.log;

    # 健康检查（不缓存）
    location /healthz {
        proxy_pass http://qwen2api_backend;
        proxy_cache off;
    }

    # 模型列表（不缓存）
    location /v1/models {
        proxy_pass http://qwen2api_backend;
        proxy_cache off;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    # 聊天补全（带缓存）
    location /v1/chat/completions {
        # 缓存配置
        proxy_cache qwen_cache;
        proxy_cache_methods POST;
        proxy_cache_key "$request_method$request_uri$request_body";

        # 缓存有效期
        proxy_cache_valid 200 24h;
        proxy_cache_valid 404 1m;

        # 缓存状态头
        add_header X-Cache-Status $upstream_cache_status always;

        # 上游配置
        proxy_pass http://qwen2api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type application/json;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Body 大小
        client_max_body_size 10m;
        client_body_buffer_size 1m;
    }

    # 缓存统计
    location /cache/stats {
        default_type application/json;
        return 200 '{"status":"ok","cache_zone":"qwen_cache","max_size":"1GB","inactive":"24h"}';
    }
}
