<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>red V1-Flash | 动力巢科技</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:monospace;background:#0a0a0a;color:#e0e0e0;padding:20px;max-width:1200px;margin:0 auto}
h1{color:#ff4444;font-size:24px;margin-bottom:5px}
.subtitle{color:#666;margin-bottom:30px;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.card{background:#111;border:1px solid #222;padding:16px;border-radius:8px}
.card h3{color:#ff4444;font-size:14px;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
.stat .val{color:#0f0}
.stat .warn{color:#ff0}
.stat .err{color:#f00}
.progress{background:#1a1a1a;height:6px;border-radius:3px;margin:10px 0}
.progress-fill{background:#ff4444;height:100%;border-radius:3px;transition:width .3s}
.api-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0}
.api-row .healthy{color:#0f0}.api-row .unhealthy{color:#f00}
#refresh{cursor:pointer;color:#ff4444;font-size:12px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.live{animation:pulse 2s infinite;color:#0f0}
</style></head>
<body>
<h1>red V1-Flash</h1>
<div class="subtitle">深圳市动力巢科技 | <span class="live">● LIVE</span> <span id="refresh">↻ Refresh</span></div>

<div class="grid">
<div class="card" id="card-model">
<h3>Model Status</h3>
<div class="stat"><span>LM Studio Server</span><span id="server-status" class="val">checking...</span></div>
<div class="stat"><span>Loaded Model</span><span id="loaded-model" class="val">-</span></div>
<div class="stat"><span>GPU Usage</span><span id="gpu-usage" class="val">-</span></div>
<div class="stat"><span>GPU Temp</span><span id="gpu-temp" class="val">-</span></div>
<div class="stat"><span>API Uptime</span><span id="uptime" class="val">-</span></div>
</div>

<div class="card" id="card-api">
<h3>API Health</h3>
<div id="api-list"></div>
</div>

<div class="card" id="card-cost">
<h3>Cost Tracker (24h)</h3>
<div id="cost-list"></div>
</div>

<div class="card" id="card-training">
<h3>Training Pipeline</h3>
<div class="stat"><span>Latest Round</span><span id="train-round" class="val">Round 4</span></div>
<div class="stat"><span>Status</span><span id="train-status" class="val">checking...</span></div>
<div class="stat"><span>Total Data</span><span id="train-data" class="val">-</span></div>
<div class="stat"><span>Distilled Pairs</span><span id="distilled-count" class="val">-</span></div>
<div class="stat"><span>Feedback Queue</span><span id="feedback-count" class="val">-</span></div>
</div>

<div class="card" id="card-logs">
<h3>Recent Activity</h3>
<div id="activity-log" style="font-size:12px;max-height:200px;overflow-y:auto"></div>
</div>
</div>

<script>
const MONITOR_API = "http://localhost:1234/v1";
const DB_PATH = "sessions.db";

async function fetchData() {
  // Model status
  try {
    let r = await fetch(MONITOR_API + "/models");
    let d = await r.json();
    let models = d.data || [];
    document.getElementById("loaded-model").innerText = models.map(m=>m.id).join(", ") || "none";
    document.getElementById("server-status").innerText = "✓ Running";
    document.getElementById("server-status").className = "val";
  } catch(e) {
    document.getElementById("server-status").innerText = "✗ Offline";
    document.getElementById("server-status").className = "err";
  }

  // Uptime
  document.getElementById("uptime").innerText = Math.floor(performance.now()/3600000) + "h";

  // Debug: show activity
  document.getElementById("activity-log").innerHTML =
    new Date().toLocaleTimeString() + " | Dashboard refreshed<br>" +
    (document.getElementById("activity-log").innerHTML || "").split("<br>").slice(0, 20).join("<br>");
}

fetchData();
document.getElementById("refresh").onclick = fetchData;
setInterval(fetchData, 30000);
</script>
</body>
</html>
