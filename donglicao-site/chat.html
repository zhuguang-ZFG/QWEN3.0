<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=https://chat.donglicao.com/">
  <title>LiMa Chat</title>
  <style>
    @font-face {
      font-family: 'Geist';
      src: url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/GeistVariableVF.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      background: #07070f;
      color: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      text-align: center;
      padding: 1rem;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 900px 600px at 20% 30%, rgba(6, 182, 212, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 700px 500px at 80% 70%, rgba(139, 92, 246, 0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.015) 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2.25rem;
      max-width: 420px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.45);
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.5), rgba(139, 92, 246, 0.5), transparent);
    }
    a { color: #67e8f9; text-decoration: none; transition: all 0.2s; }
    a:hover { color: #a78bfa; text-decoration: underline; }
    p { margin: 0.5rem 0; color: #94a3b8; }
    .brand {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(90deg, #06b6d4, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
  <script>
    location.replace('https://chat.donglicao.com/');
  </script>
</head>
<body>
  <div class="card">
    <div class="brand">LiMa Chat</div>
    <p>正在跳转到 <a href="https://chat.donglicao.com/">chat.donglicao.com</a></p>
    <p>本地开发请直接打开 <a href="../chat-web/index.html">chat-web/index.html</a></p>
  </div>
</body>
</html>
