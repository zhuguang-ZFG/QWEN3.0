<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=https://chat.donglicao.com/">
  <title>LiMa Chat</title>
  <style>
    @font-face {

  <div class="card">
