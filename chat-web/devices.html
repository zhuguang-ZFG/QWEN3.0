<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>设备管理 - LiMa 星云</title>
  <meta name="description" content="在 LiMa 星云控制台管理已绑定的 AI 设备。">
  <meta name="theme-color" content="#0a0a0f">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss: ws: https://chat.donglicao.com https://api.donglicao.com; font-src 'self'; upgrade-insecure-requests;">
  <link rel="stylesheet" href="styles.css?v=taste3">
  <style>
    .devices-layout { display:flex; min-height:100vh; width:100%; }
    .devices-main { flex:1; padding:32px; position:relative; z-index:1; max-width:1200px; margin:0 auto; width:100%; }
    .devices-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .devices-header h1 { font-size:1.5rem; }
    .btn-primary { padding:8px 14px; border-radius:var(--radius-sm); border:1px solid transparent; background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff; font-weight:600; cursor:pointer; }
    .device-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
    .device-tile { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:18px; cursor:pointer; transition:border-color .2s, transform .2s; }
    .device-tile:hover { border-color:rgba(255,255,255,.12); transform:translateY(-2px); }
    .device-tile-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .device-tile-info { display:flex; align-items:center; gap:12px; }
    .device-tile-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:rgba(6,182,212,.12); color:var(--accent); }
    .device-tile-name { font-weight:600; }
    .device-tile-sn { font-size:.8rem; color:var(--text-muted); }
    .device-tile-meta { display:flex; gap:12px; font-size:.8rem; color:var(--text-muted); margin-top:10px; }
    .status-badge { display:inline-flex; align-items:center; gap:6px; font-size:.75rem; padding:3px 8px; border-radius:999px; background:rgba(255,255,255,.06); }
    .status-badge.on { color:var(--green); background:rgba(52,211,153,.1); }
    .status-badge.off { color:var(--text-muted); }
    .status-badge.busy { color:var(--warm); background:rgba(245,158,11,.1); }
    .empty { color:var(--text-muted); text-align:center; padding:64px 24px; }
    .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; display:none; }
    .drawer-overlay.open { display:block; }
    .drawer { position:fixed; top:0; right:0; width:min(420px, 100vw); height:100%; background:var(--bg-card); border-left:1px solid var(--border); z-index:101; transform:translateX(100%); transition:transform .25s var(--ease-out); display:flex; flex-direction:column; }
    .drawer.open { transform:translateX(0); }
    .drawer-header { padding:24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .drawer-body { flex:1; overflow-y:auto; padding:24px; }
    .drawer-section { margin-bottom:24px; }
    .drawer-section h3 { font-size:.85rem; color:var(--text-muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:.05em; }
    .drawer-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,.05); font-size:.9rem; }
    .drawer-row span:first-child { color:var(--text-muted); }
    .task-list { display:flex; flex-direction:column; gap:10px; }
    .task-item { background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px; }
    .task-item .cap { font-size:.85rem; font-weight:500; }
    .task-item .sub { font-size:.75rem; color:var(--text-muted); margin-top:4px; }
    .task-progress { height:4px; background:rgba(255,255,255,.08); border-radius:2px; margin-top:8px; overflow:hidden; }
    .task-progress-bar { height:100%; background:linear-gradient(90deg, var(--accent), var(--accent-2)); transition:width .3s ease; }
    .drawer-actions { padding:24px; border-top:1px solid var(--border); display:flex; gap:12px; }
    .btn-danger { padding:8px 14px; border-radius:var(--radius-sm); border:1px solid rgba(239,68,68,.4); background:rgba(239,68,68,.1); color:#ef4444; cursor:pointer; }
    .btn-secondary { padding:8px 14px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg-card-hover); color:var(--text); cursor:pointer; }
    .modal-overlay.open { display:flex; }
    @media (max-width:640px) {
      .devices-main { padding:20px; }
      .drawer { width:100vw; }
    }
  </style>
</head>
<body>
  <div class="devices-layout">
    <aside class="sidebar" style="width:var(--sidebar-w); flex-shrink:0;">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-mark"><svg class="svg-icon"><use href="icons.svg#i-sparkles"/></svg></div>
          <div class="brand-text"><h1>LiMa 星云</h1><div class="brand-text-sub">控制台</div></div>
        </div>
      </div>
      <div class="section-label">账户</div>
      <div class="device-list">
        <a href="index.html" class="device-card" style="text-decoration:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon ai"><svg class="svg-icon"><use href="icons.svg#i-bot"/></svg></div><div class="device-meta"><div class="device-name">对话</div><div class="device-sub">星云 AI</div></div></div>
        </a>
        <a href="devices.html" class="device-card active" style="text-decoration:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon draw"><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div><div class="device-meta"><div class="device-name">设备</div><div class="device-sub">管理硬件</div></div></div>
        </a>
        <a href="handwriting.html" class="device-card" style="text-decoration:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon write"><svg class="svg-icon"><use href="icons.svg#i-pencil"/></svg></div><div class="device-meta"><div class="device-name">仿手写</div><div class="device-sub">生成笔迹</div></div></div>
        </a>
        <a href="keys.html" class="device-card" style="text-decoration:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon write"><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></div><div class="device-meta"><div class="device-name">API Key</div><div class="device-sub">访问密钥</div></div></div>
        </a>
        <a href="usage.html" class="device-card" style="text-decoration:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon human"><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div><div class="device-meta"><div class="device-name">用量</div><div class="device-sub">Token / 费用</div></div></div>
        </a>
      </div>
    </aside>

    <main class="devices-main">
      <div class="devices-header">
        <h1>设备管理</h1>
        <button class="btn-primary" id="addDeviceBtn">+ 添加设备</button>
      </div>
      <div id="deviceGrid" class="device-grid"></div>
      <div id="emptyState" class="device-empty-illust" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <p>暂无绑定设备<br>点击右上角添加你的第一台 AI 设备</p>
      </div>
    </main>
  </div>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="detailDrawer" aria-label="设备详情">
    <div class="drawer-header">
      <h2 id="drawerTitle">设备详情</h2>
      <button class="btn-secondary" id="closeDrawer" aria-label="关闭">关闭</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-actions">
      <button class="btn-danger" id="unbindBtn">解绑设备</button>
    </div>
  </aside>

  <div class="modal-overlay" id="bindModal">
    <div class="modal">
      <div class="modal-title">添加设备</div>
      <div class="modal-desc">输入设备 SN 与激活码完成绑定。</div>
      <input class="modal-input" id="bindSn" placeholder="设备 SN" autocomplete="off">
      <input class="modal-input" id="bindCode" placeholder="激活码" autocomplete="off" style="margin-top:12px;">
      <div class="modal-actions">
        <button class="modal-btn" id="cancelBind">取消</button>
        <button class="modal-btn primary" id="confirmBind">绑定</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <div class="modal-title">确认解绑</div>
      <div class="modal-desc">解绑后设备将不再受该账号控制，确认继续？</div>
      <div class="modal-actions">
        <button class="modal-btn" id="cancelUnbind">取消</button>
        <button class="btn-danger confirm" id="confirmUnbind">确认解绑</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/app-boot.js?v=taste3"></script>
  <script src="js/api.js?v=taste3"></script>
  <script src="js/auth.js?v=taste3"></script>
  <script src="js/devices.js?v=taste3"></script>
</body>
</html>
