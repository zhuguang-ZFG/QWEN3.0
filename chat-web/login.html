<!DOCTYPE html>
<html lang="zh-CN" class="auth-page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://chat.donglicao.com; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob:; font-src 'self'; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; upgrade-insecure-requests; base-uri 'self'; form-action 'self';">
  <title>登录 - LiMa 控制台</title>
  <meta name="description" content="登录 LiMa 量子星云控制台，管理 API Key、设备与用量。">
  <meta name="theme-color" content="#07070f">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2306b6d4'/%3E%3Cpath d='M50 20L58 45H82L62 62L70 86L50 70L30 86L38 62L18 45H42Z' fill='%23070f0f'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css?v=taste3">
  <style>
    html.auth-page, body.auth-page { height:100%; }
    body.auth-page { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
  </style>
</head>
<body class="auth-page">
  <!-- Nebula background -->
  <div class="auth-nebula" aria-hidden="true"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/><path d="M20 2v4M22 4h-4"/><circle cx="4" cy="20" r="2"/></svg>
      <span>LiMa 控制台</span>
    </div>
    <h1>欢迎回来</h1>
    <p class="subtitle">登录以管理 API Key、设备与用量</p>
    <form class="auth-form" id="login-form" novalidate>
      <label>邮箱
        <div class="auth-input-wrap">
          <input type="email" name="email" autocomplete="email" required placeholder="you@example.com">
        </div>
      </label>
      <label>密码
        <div class="auth-input-wrap">
          <input type="password" name="password" autocomplete="current-password" required placeholder="••••••">
        </div>
      </label>
      <div id="turnstile-widget" class="turnstile-widget"></div>
      <div class="auth-error" id="error" role="alert" hidden></div>
      <button type="submit" class="auth-btn" id="submit" disabled>登录</button>
    </form>
    <p class="auth-footer">还没有账号？<a href="register.html">去注册</a></p>
  </div>

  <script src="js/app-boot.js?v=taste3"></script>
  <script src="js/api.js?v=taste3"></script>
  <script src="js/auth.js?v=taste3"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script>
    (function () {
      "use strict";
      LiMaAuth.redirectIfLoggedIn();
      const form = document.getElementById("login-form");
      const error = document.getElementById("error");
      const submit = document.getElementById("submit");
      let turnstileToken = null;

      function initTurnstile() {
        const siteKey = window.LIMA_CONFIG && window.LIMA_CONFIG.turnstileSiteKey;
        if (!siteKey || !window.turnstile) {
          submit.disabled = false;
          return;
        }
        window.turnstile.render("#turnstile-widget", {
          sitekey: siteKey,
          callback: function (token) {
            turnstileToken = token;
            submit.disabled = false;
          },
          "expired-callback": function () { turnstileToken = null; submit.disabled = true; },
          "error-callback": function () { turnstileToken = null; submit.disabled = true; },
        });
      }
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initTurnstile);
      } else {
        initTurnstile();
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        showError("");
        const email = form.email.value.trim();
        const password = form.password.value;
        if (!email || !password) { showError("请填写邮箱和密码"); return; }
        const siteKey = window.LIMA_CONFIG && window.LIMA_CONFIG.turnstileSiteKey;
        if (siteKey && !turnstileToken) { showError("请完成人机验证"); return; }
        submit.disabled = true;
        submit.textContent = "登录中…";
        try {
          const data = await LiMaAuth.login(email, password, turnstileToken);
          LiMaAuth.setToken(data.token);
          window.location.href = "index.html";
        } catch (err) {
          showError(err.message || "登录失败，请重试");
          submit.disabled = false;
          submit.textContent = "登录";
        }
      });
      function showError(msg) { error.textContent = msg; error.hidden = !msg; }
    })();
  </script>
</body>
</html>
