<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>API Key 管理 - LiMa 星云</title>
  <meta name="description" content="管理 LiMa 星云 API Key，创建、查看与删除访问密钥。">
  <meta name="theme-color" content="#0a0a0f">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://chat.donglicao.com https://api.donglicao.com; font-src 'self'; upgrade-insecure-requests;">
  <link rel="stylesheet" href="styles.css?v=taste3">
  <style>
    .keys-layout { display:flex; min-height:100vh; width:100%; }
    .keys-main { flex:1; padding:32px; position:relative; z-index:1; max-width:960px; margin:0 auto; width:100%; }
    .keys-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
    .keys-header h1 { font-size:1.5rem; }
    .key-list { display:flex; flex-direction:column; gap:12px; }
    .btn-primary { padding:8px 14px; border-radius:var(--radius-sm); border:1px solid transparent; background:linear-gradient(135deg, var(--accent), var(--violet)); color:#fff; font-weight:600; cursor:pointer; transition:all .25s var(--ease-out); }
    .btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 4px 16px rgba(6,182,212,.3); }
    .btn-primary:disabled { opacity:.6; cursor:not-allowed; transform:none; filter:none; box-shadow:none; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; z-index:50; }
    .modal-overlay.open { display:flex; }
    .modal { background:rgba(20,20,28,.95); border:1px solid rgba(255,255,255,.1); border-radius:var(--radius); padding:28px; width:100%; max-width:520px; margin:24px; box-shadow:0 24px 80px rgba(0,0,0,.6); }
    .modal h2 { margin-bottom:12px; }
    .modal p { color:var(--text-muted); margin-bottom:16px; font-size:.95rem; }
    .key-reveal { display:flex; gap:8px; align-items:center; }
    .key-reveal input { flex:1; padding:12px; border-radius:var(--radius-sm); border:1px solid rgba(255,255,255,.1); background:rgba(0,0,0,.35); color:var(--text); font-family:ui-monospace, monospace; outline:none; transition:border-color .25s var(--ease-out), box-shadow .25s var(--ease-out); }
    .key-reveal input:focus { border-color:rgba(6,182,212,.5); box-shadow:0 0 0 3px rgba(6,182,212,.1); }
    .key-reveal button { padding:12px; border-radius:var(--radius-sm); border:none; background:var(--bg-card-hover); color:var(--text); cursor:pointer; }
    .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
    .modal-actions button { padding:10px 16px; border-radius:var(--radius-sm); border:none; cursor:pointer; }
    .hidden { display:none !important; }
    @media (max-width:640px) {
      .keys-main { padding:20px; }
      .keys-header { flex-direction:column; align-items:flex-start; gap:12px; }
      .key-card { flex-direction:column; align-items:flex-start; }
      .key-card-actions { width:100%; justify-content:flex-end; }
    }
  </style>
</head>
<body>
  <div class="keys-layout">
    <aside class="sidebar" style="width:var(--sidebar-w); flex-shrink:0;">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-mark"><svg class="svg-icon"><use href="icons.svg#i-sparkles"/></svg></div>
          <div class="brand-text"><h1>LiMa 星云</h1><div class="brand-text-sub">控制台</div></div>
        </div>
      </div>
      <div class="section-label">账户</div>
      <div class="device-list">
        <a href="index.html" class="device-card" style="text-decoration:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon ai"><svg class="svg-icon"><use href="icons.svg#i-bot"/></svg></div><div class="device-meta"><div class="device-name">对话</div><div class="device-sub">星云 AI</div></div></div>
        </a>
        <a href="keys.html" class="device-card active" style="text-decoration:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon draw"><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></div><div class="device-meta"><div class="device-name">API Key</div><div class="device-sub">访问密钥</div></div></div>
        </a>
        <a href="devices.html" class="device-card" style="text-decoration:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon human"><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div><div class="device-meta"><div class="device-name">设备</div><div class="device-sub">管理硬件</div></div></div>
        </a>
        <a href="usage.html" class="device-card" style="text-decoration:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon write"><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div><div class="device-meta"><div class="device-name">用量</div><div class="device-sub">Token / 费用</div></div></div>
        </a>
      </div>
      <div class="section-label" style="margin-top:auto;">账户</div>
      <div class="device-list">
        <button class="device-card" id="logoutBtn" style="width:100%; text-align:left; background:none; border:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon" style="background:rgba(244,63,94,.12)"><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></div><div class="device-meta"><div class="device-name">退出登录</div></div></div>
        </button>
      </div>
    </aside>

    <main class="keys-main">
      <div class="keys-header">
        <h1>API Key 管理</h1>
        <button class="btn-primary" id="createBtn">+ 创建新 Key</button>
      </div>
      <div id="keyList" class="key-list"></div>
      <div id="empty" class="key-empty-illust hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        <p>暂无 API Key<br>点击右上角创建你的第一个密钥</p>
      </div>
    </main>
  </div>

  <div class="modal-overlay hidden" id="newKeyModal" role="dialog" aria-modal="true" aria-labelledby="newKeyTitle">
    <div class="modal">
      <h2 id="newKeyTitle">保存你的 API Key</h2>
      <p>完整 Key 仅显示这一次，请立即复制并妥善保存。</p>
      <div class="key-reveal">
        <input type="text" id="newKeyInput" readonly aria-label="完整 API Key">
        <button id="copyKeyBtn" type="button" class="key-copy-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          复制
        </button>
      </div>
      <div class="modal-actions">
        <button id="closeModalBtn" type="button" style="background:var(--bg-card-hover); color:var(--text); border-radius:var(--radius-sm);">完成</button>
      </div>
    </div>
  </div>

  <script src="js/app-boot.js?v=taste3"></script>
  <script src="js/api.js?v=taste3"></script>
  <script src="js/auth.js?v=taste3"></script>
  <script src="js/keys.js?v=taste3"></script>
</body>
</html>
