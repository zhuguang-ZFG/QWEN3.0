<!DOCTYPE html>
<html lang="zh-CN" class="auth-page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - LiMa 控制台</title>
  <meta name="description" content="注册 LiMa 量子星云控制台，开始管理 AI 设备与 API Key。">
  <meta name="theme-color" content="#07070f">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2306b6d4'/%3E%3Cpath d='M50 20L58 45H82L62 62L70 86L50 70L30 86L38 62L18 45H42Z' fill='%23070f0f'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css?v=taste2">
  <style>
    html.auth-page, body.auth-page { height:100%; }
    body.auth-page { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .auth-card {
      position:relative; width:100%; max-width:420px;
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
      padding:40px 32px; z-index:1;
    }
    .auth-card h1 { font-size:1.6rem; margin-bottom:8px; text-align:center; }
    .auth-card .subtitle { color:var(--text-muted); text-align:center; margin-bottom:28px; font-size:.95rem; }
    .auth-form { display:flex; flex-direction:column; gap:16px; }
    .auth-form label { display:flex; flex-direction:column; gap:6px; color:var(--text-muted); font-size:.9rem; }
    .auth-form input {
      padding:12px 14px; border-radius:var(--radius-sm); border:1px solid var(--border);
      background:var(--bg-input); color:var(--text); font:inherit;
    }
    .auth-form input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
    .auth-btn {
      padding:12px; border-radius:var(--radius-sm); border:none; background:var(--accent);
      color:var(--bg); font-weight:600; cursor:pointer; transition:filter .2s;
    }
    .auth-btn:hover { filter:brightness(1.1); }
    .auth-btn:disabled { opacity:.6; cursor:not-allowed; }
    .auth-footer { text-align:center; margin-top:20px; color:var(--text-muted); font-size:.9rem; }
    .auth-footer a { color:var(--accent-light); text-decoration:none; }
    .auth-error { color:var(--rose-light); background:rgba(244,63,94,.1); padding:10px 12px; border-radius:var(--radius-sm); font-size:.9rem; }
    .auth-logo { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:18px; }
    .auth-logo svg { width:32px; height:32px; color:var(--accent); }
  </style>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/><path d="M20 2v4M22 4h-4"/><circle cx="4" cy="20" r="2"/></svg>
      <span>LiMa 控制台</span>
    </div>
    <h1>创建账号</h1>
    <p class="subtitle">注册以开始使用 LiMa 量子星云</p>
    <form class="auth-form" id="register-form" novalidate>
      <label>邮箱<input type="email" name="email" autocomplete="email" required placeholder="you@example.com"></label>
      <label>昵称<input type="text" name="nickname" autocomplete="nickname" placeholder="可选"></label>
      <label>密码<input type="password" name="password" autocomplete="new-password" required minlength="6" placeholder="至少 6 位"></label>
      <label>确认密码<input type="password" name="passwordConfirm" autocomplete="new-password" required placeholder="再次输入密码"></label>
      <div class="auth-error" id="error" role="alert" hidden></div>
      <button type="submit" class="auth-btn" id="submit">注册</button>
    </form>
    <p class="auth-footer">已有账号？<a href="login.html">去登录</a></p>
  </div>

  <script src="js/api.js?v=taste2"></script>
  <script src="js/auth.js?v=taste2"></script>
  <script>
    (function () {
      "use strict";
      LiMaAuth.redirectIfLoggedIn();
      const form = document.getElementById("register-form");
      const error = document.getElementById("error");
      const submit = document.getElementById("submit");
      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        showError("");
        const email = form.email.value.trim();
        const nickname = form.nickname.value.trim();
        const password = form.password.value;
        const confirm = form.passwordConfirm.value;
        if (!email || !password) { showError("请填写邮箱和密码"); return; }
        if (password.length < 6) { showError("密码至少 6 位"); return; }
        if (password !== confirm) { showError("两次输入的密码不一致"); return; }
        submit.disabled = true;
        submit.textContent = "注册中…";
        try {
          const data = await LiMaAuth.register(email, password, nickname || undefined);
          LiMaAuth.setToken(data.token);
          window.location.href = "index.html";
        } catch (err) {
          showError(err.message || "注册失败，请重试");
          submit.disabled = false;
          submit.textContent = "注册";
        }
      });
      function showError(msg) { error.textContent = msg; error.hidden = !msg; }
    })();
  </script>
</body>
</html>
