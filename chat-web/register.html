<!DOCTYPE html>
<html lang="zh-CN" class="auth-page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' ws: wss: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob:; font-src 'self'; frame-ancestors 'none'; upgrade-insecure-requests; base-uri 'self'; form-action 'self';">
  <title>注册 - LiMa 控制台</title>
  <meta name="description" content="注册 LiMa 量子星云控制台，开始管理 AI 设备与 API Key。">
  <meta name="theme-color" content="#07070f">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2306b6d4'/%3E%3Cpath d='M50 20L58 45H82L62 62L70 86L50 70L30 86L38 62L18 45H42Z' fill='%23070f0f'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css?v=taste3">
  <style>
    html.auth-page, body.auth-page { height:100%; }
    body.auth-page { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
  </style>
</head>
<body class="auth-page">
  <!-- Nebula background -->
  <div class="auth-nebula" aria-hidden="true"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"/><path d="M20 2v4M22 4h-4"/><circle cx="4" cy="20" r="2"/></svg>
      <span>LiMa 控制台</span>
    </div>
    <h1>创建账号</h1>
    <p class="subtitle">注册以开始使用 LiMa 量子星云</p>
    <form class="auth-form" id="register-form" novalidate>
      <label>邮箱
        <div class="auth-input-wrap">
          <input type="email" name="email" autocomplete="email" required placeholder="you@example.com">
        </div>
      </label>
      <label>昵称
        <div class="auth-input-wrap">
          <input type="text" name="nickname" autocomplete="nickname" placeholder="可选">
        </div>
      </label>
      <label>密码
        <div class="auth-input-wrap">
          <input type="password" name="password" autocomplete="new-password" required minlength="6" placeholder="至少 6 位" id="pw-input">
        </div>
        <div class="pw-strength" id="pw-strength" data-level="0">
          <div class="pw-strength-bar"></div>
          <div class="pw-strength-bar"></div>
          <div class="pw-strength-bar"></div>
          <div class="pw-strength-bar"></div>
        </div>
        <div class="pw-strength-hint" id="pw-hint"></div>
      </label>
      <label>确认密码
        <div class="auth-input-wrap">
          <input type="password" name="passwordConfirm" autocomplete="new-password" required placeholder="再次输入密码">
        </div>
      </label>
      <div class="auth-error" id="error" role="alert" hidden></div>
      <button type="submit" class="auth-btn" id="submit">注册</button>
    </form>
    <p class="auth-footer">已有账号？<a href="login.html">去登录</a></p>
  </div>

  <script src="js/api.js?v=taste3"></script>
  <script src="js/auth.js?v=taste3"></script>
  <script>
    (function () {
      "use strict";
      LiMaAuth.redirectIfLoggedIn();
      const form = document.getElementById("register-form");
      const error = document.getElementById("error");
      const submit = document.getElementById("submit");
      const pwInput = document.getElementById("pw-input");
      const pwStrength = document.getElementById("pw-strength");
      const pwHint = document.getElementById("pw-hint");

      /* Password strength meter */
      const hints = ["", "弱", "一般", "较强", "强"];
      pwInput.addEventListener("input", function () {
        const pw = pwInput.value;
        let level = 0;
        if (pw.length >= 6) level = 1;
        if (pw.length >= 8 && /[A-Z]/.test(pw)) level = 2;
        if (level === 2 && /\d/.test(pw)) level = 3;
        if (level === 3 && /[^A-Za-z0-9]/.test(pw)) level = 4;
        if (!pw) level = 0;
        pwStrength.dataset.level = level;
        pwHint.textContent = level ? hints[level] : "";
      });

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        showError("");
        const email = form.email.value.trim();
        const nickname = form.nickname.value.trim();
        const password = form.password.value;
        const confirm = form.passwordConfirm.value;
        if (!email || !password) { showError("请填写邮箱和密码"); return; }
        if (password.length < 6) { showError("密码至少 6 位"); return; }
        if (password !== confirm) { showError("两次输入的密码不一致"); return; }
        submit.disabled = true;
        submit.textContent = "注册中…";
        try {
          const data = await LiMaAuth.register(email, password, nickname || undefined);
          LiMaAuth.setToken(data.token);
          window.location.href = "index.html";
        } catch (err) {
          showError(err.message || "注册失败，请重试");
          submit.disabled = false;
          submit.textContent = "注册";
        }
      });
      function showError(msg) { error.textContent = msg; error.hidden = !msg; }
    })();
  </script>
</body>
</html>
