<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>用量统计 - LiMa 星云</title>
  <meta name="description" content="查看 LiMa 星云 API 用量、Token 消耗与费用估算。">
  <meta name="theme-color" content="#0a0a0f">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; upgrade-insecure-requests;">
  <link rel="stylesheet" href="styles.css?v=nebula2">
  <style>
    .usage-layout { display:flex; min-height:100vh; width:100%; }
    .usage-main { flex:1; padding:32px; position:relative; z-index:1; max-width:1200px; margin:0 auto; width:100%; }
    .usage-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .usage-header h1 { font-size:1.5rem; }
    .period-select { padding:8px 12px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg-input); color:var(--text); }
    .summary-cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:24px; }
    .summary-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
    .summary-card .label { color:var(--text-muted); font-size:.85rem; margin-bottom:8px; }
    .summary-card .value { font-size:1.6rem; font-weight:600; }
    .chart-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(360px, 1fr)); gap:16px; margin-bottom:24px; }
    .chart-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
    .chart-card h3 { font-size:1rem; margin-bottom:12px; color:var(--text-muted); }
    .chart { width:100%; height:260px; }
    .table-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
    .table-card h3 { font-size:1rem; margin-bottom:12px; color:var(--text-muted); }
    .usage-table { width:100%; border-collapse:collapse; }
    .usage-table th, .usage-table td { padding:12px; text-align:left; border-bottom:1px solid var(--border); }
    .usage-table th { color:var(--text-muted); font-weight:500; font-size:.85rem; }
    .pager { display:flex; justify-content:flex-end; gap:8px; margin-top:16px; }
    .pager button { padding:6px 12px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg-card-hover); color:var(--text); cursor:pointer; }
    .pager button:disabled { opacity:.5; cursor:not-allowed; }
    .empty { color:var(--text-muted); text-align:center; padding:48px 24px; }
    @media (max-width:640px) {
      .usage-main { padding:20px; }
      .chart { height:220px; }
    }
  </style>
</head>
<body>
  <div class="usage-layout">
    <aside class="sidebar" style="width:var(--sidebar-w); flex-shrink:0;">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-mark"><svg class="svg-icon"><use href="icons.svg#i-sparkles"/></svg></div>
          <div class="brand-text"><h1>LiMa 星云</h1><div class="brand-text-sub">控制台</div></div>
        </div>
      </div>
      <div class="section-label">账户</div>
      <div class="device-list">
        <a href="index.html" class="device-card" style="text-decoration:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon ai"><svg class="svg-icon"><use href="icons.svg#i-bot"/></svg></div><div class="device-meta"><div class="device-name">对话</div><div class="device-sub">星云 AI</div></div></div>
        </a>
        <a href="devices.html" class="device-card" style="text-decoration:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon draw"><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div><div class="device-meta"><div class="device-name">设备</div><div class="device-sub">管理硬件</div></div></div>
        </a>
        <a href="keys.html" class="device-card" style="text-decoration:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon draw"><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></div><div class="device-meta"><div class="device-name">API Key</div><div class="device-sub">访问密钥</div></div></div>
        </a>
        <a href="usage.html" class="device-card active" style="text-decoration:none; color:inherit;">
          <div class="device-card-top"><div class="device-icon write"><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div><div class="device-meta"><div class="device-name">用量</div><div class="device-sub">Token / 费用</div></div></div>
        </a>
      </div>
    </aside>

    <main class="usage-main">
      <div class="usage-header">
        <h1>用量统计</h1>
        <select class="period-select" id="periodSelect" aria-label="时间范围">
          <option value="7">近 7 天</option>
          <option value="30" selected>近 30 天</option>
          <option value="90">近 90 天</option>
        </select>
      </div>

      <div class="summary-cards">
        <div class="summary-card"><div class="label">Token 总消耗</div><div class="value" id="totalTokens">—</div></div>
        <div class="summary-card"><div class="label">请求总数</div><div class="value" id="totalRequests">—</div></div>
        <div class="summary-card"><div class="label">预估费用</div><div class="value" id="estimatedCost">—</div></div>
      </div>

      <div class="chart-grid">
        <div class="chart-card"><h3>每日 Token 消耗</h3><div id="tokenChart" class="chart"></div></div>
        <div class="chart-card"><h3>每日请求次数</h3><div id="requestChart" class="chart"></div></div>
        <div class="chart-card"><h3>能力分布</h3><div id="capabilityChart" class="chart"></div></div>
      </div>

      <div class="table-card">
        <h3>明细</h3>
        <table class="usage-table" aria-label="用量明细">
          <thead><tr><th>日期</th><th>类型</th><th>Token</th><th>费用（元）</th></tr></thead>
          <tbody id="detailsBody"></tbody>
        </table>
        <div class="pager" id="pager"></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"
          integrity="sha384-BQKzmHvQLMCAnL3UtDBA1Al5tFjsCz1wrMlIUA1wkzo14DYkRWjywW+p9pCj0cwd"
          crossorigin="anonymous"></script>
  <script src="js/api.js?v=nebula2"></script>
  <script src="js/auth.js?v=nebula2"></script>
  <script src="js/usage.js?v=nebula2"></script>
</body>
</html>
