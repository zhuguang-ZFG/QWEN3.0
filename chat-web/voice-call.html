<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://chat.donglicao.com wss://chat.donglicao.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob:; font-src 'self'; frame-ancestors 'none'; upgrade-insecure-requests; base-uri 'self'; form-action 'self';">
<meta name="theme-color" content="#000000">
<title>LiMa 星云 AI 语音/视频通话</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#06b6d4;
  --accent-light:#22d3ee;
  --accent-glow:rgba(6,182,212,0.35);
  --bg:#000000;
  --bg-elevated:#0a0a0a;
  --text:#f5f5f7;
  --text-muted:#86868b;
  --border:rgba(255,255,255,0.08);
  --red:#ff453a;
  --green:#30d158;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  height:100vh;
  height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  user-select:none;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 500px 350px at 20% 40%,rgba(6,182,212,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 400px 300px at 80% 70%,rgba(6,182,212,0.04) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
.brand{
  position:absolute;
  top:max(24px,env(safe-area-inset-top));
  left:50%;
  transform:translateX(-50%);
  font-size:1.1rem;
  font-weight:700;
  letter-spacing:-0.02em;
  color:var(--text);
  z-index:1;
}
.status{
  position:absolute;
  top:58px;
  font-size:.75rem;
  color:var(--text-muted);
  opacity:.9;
  z-index:1;
}
.video-container{
  position:relative;
  width:min(280px,72vw);
  height:min(420px,58vh);
  border-radius:28px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
  background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.015));
  box-shadow:0 24px 70px rgba(0,0,0,0.65), inset 0 0 0 0.5px rgba(255,255,255,0.06);
  z-index:1;
  transition:border-color .25s ease,box-shadow .25s ease;
}
.video-container video{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scaleX(-1);
}
.video-container.speaking{
  border-color:rgba(6,182,212,0.55);
  box-shadow:0 24px 70px rgba(0,0,0,0.65),0 0 55px rgba(6,182,212,0.28),inset 0 0 0 0.5px rgba(255,255,255,0.08);
}
.video-placeholder{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,rgba(6,182,212,0.1),rgba(139,92,246,0.05));
}
.video-placeholder svg{
  width:72px;
  height:72px;
  color:var(--accent);
  fill:currentColor;
  opacity:.85;
  filter:drop-shadow(0 0 18px rgba(6,182,212,0.25));
}
.mode-select{
  position:absolute;
  top:max(86px,env(safe-area-inset-top)+62px);
  z-index:1;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  border-radius:20px;
  padding:6px 12px;
  color:var(--text);
  font-size:.8rem;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  outline:none;
}
.subtitle{
  position:absolute;
  bottom:max(130px,calc(env(safe-area-inset-bottom) + 130px));
  width:90%;
  max-width:420px;
  text-align:center;
  font-size:.9rem;
  line-height:1.5;
  min-height:2.5em;
  color:var(--text-muted);
  z-index:1;
}
.controls{
  position:absolute;
  bottom:max(40px,env(safe-area-inset-bottom));
  display:flex;
  gap:20px;
  align-items:center;
  z-index:1;
}
.btn{
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s cubic-bezier(0.25,0.1,0.25,1);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.btn-call{
  width:68px;
  height:68px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--green),#34d399);
  box-shadow:0 4px 24px rgba(48,209,88,.4),0 0 0 1px rgba(255,255,255,0.08) inset;
}
.btn-call.active{
  background:linear-gradient(135deg,var(--accent),var(--violet));
  box-shadow:0 6px 30px rgba(6,182,212,0.4),0 0 0 1px rgba(255,255,255,0.1) inset;
}
.btn-call:active{transform:scale(.92)}
.btn-end{
  width:52px;
  height:52px;
  border-radius:50%;
  background:linear-gradient(135deg,#ff5f57,var(--red));
  box-shadow:0 4px 20px rgba(255,68,58,.35),0 0 0 1px rgba(255,255,255,0.08) inset;
}
.btn-end:active{transform:scale(.92)}
.btn svg{width:26px;height:26px;fill:#fff}
.btn-label{
  position:absolute;
  bottom:-22px;
  font-size:.65rem;
  color:var(--text-muted);
  white-space:nowrap;
}
@media (prefers-reduced-motion:reduce){
  .video-container{transition:none}
  .btn{transition:none}
}
</style>
</head>
<body>
<div class="brand">LiMa 星云 AI 语音/视频通话</div>
<select class="mode-select" id="modeSelect">
  <option value="gemini">Gemini 实时通话</option>
  <option value="local">本地语音对话</option>
</select>
<div class="status" id="status">点击绿色按钮开始语音/视频通话</div>
<div class="video-container" id="videoContainer">
  <div class="video-placeholder" id="placeholder">
    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
  </div>
  <video id="localVideo" autoplay muted playsinline style="display:none"></video>
</div>
<div class="subtitle" id="subtitle"></div>
<div class="controls">
  <button class="btn btn-end" id="btnEnd" title="结束通话">
    <svg viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08a.956.956 0 010-1.36C3.46 8.84 7.46 7 12 7s8.54 1.84 11.71 4.72c.18.18.29.44.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.1-.7-.28a11.3 11.3 0 00-2.67-1.85.996.996 0 01-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
  </button>
  <div style="position:relative">
    <button class="btn btn-call" id="btnCall">
      <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
    </button>
    <span class="btn-label">语音/视频通话</span>
  </div>
</div>
<script src="js/app-boot.js?v=taste3"></script>
<script>
const $=id=>document.getElementById(id);
const statusEl=$('status'),subtitleEl=$('subtitle'),btnCall=$('btnCall'),btnEnd=$('btnEnd');
const videoEl=$('localVideo'),placeholder=$('placeholder'),videoContainer=$('videoContainer');

let ws=null,stream=null,audioCtx=null,worklet=null,frameTimer=null,playing=false;
let audioQueue=[],nextPlayTime=0;
const SAMPLE_RATE_IN=16000;
let SAMPLE_RATE_OUT=24000;

function getLimaApiKey(){
  return (sessionStorage.getItem('lima-api-key')||'').trim();
}

async function getApiConfig(){
  const key=getLimaApiKey();
  const headers={'Content-Type':'application/json'};
  if(key)headers['Authorization']='Bearer '+key;
  const r=await fetch('/api/live-key',{headers});
  if(r.status===401)throw new Error('当前未授权，免费语音通话可能暂时不可用');
  if(!r.ok)throw new Error('无法获取 API 配置：'+r.status);
  return r.json();
}

async function fetchVoiceTicket(){
  const key=getLimaApiKey();
  const headers={'Content-Type':'application/json'};
  if(key)headers['Authorization']='Bearer '+key;
  const r=await fetch('/v1/voice/ticket',{method:'POST',headers});
  if(r.status===401)throw new Error('当前未授权，语音通话可能暂时不可用');
  if(!r.ok)throw new Error('无法获取语音通话凭证：'+r.status);
  const data=await r.json();
  if(!data.ticket)throw new Error('服务端未返回语音通话凭证');
  return data.ticket;
}

async function startCall(){
  statusEl.textContent='正在连接...';
  const mode=$('modeSelect').value;
  try{
    let ticket=await fetchVoiceTicket();

    if(mode==='gemini'){
      const cfg=await getApiConfig();
      if(!cfg.url)throw new Error('服务端未返回通话地址');
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480},audio:{sampleRate:SAMPLE_RATE_IN,echoCancellation:true,noiseSuppression:true}});
      videoEl.srcObject=stream;videoEl.style.display='block';placeholder.style.display='none';
      SAMPLE_RATE_OUT=24000;
      const proto=window.location.protocol==='https:'?'wss:':'ws:';
      let base;
      if (/^wss?:\/\//i.test(cfg.url)) {
        base = cfg.url;
      } else if (cfg.url.startsWith('/')) {
        base = window.LIMA_CONFIG.wsOrigin.replace(/^wss?:\/\//,'') + cfg.url;
      } else {
        base = cfg.url;
      }
      const wsUrl=(/^wss?:\/\//i.test(base)?base:proto+'//'+base)+'?ticket='+encodeURIComponent(ticket);
      ws=new WebSocket(wsUrl);
      ws.onopen=()=>{
        ws.send(JSON.stringify({setup:{model:cfg.model,generationConfig:{responseModalities:['AUDIO'],speechConfig:{voiceConfig:{prebuiltVoiceConfig:{voiceName:'Aoede'}}}}}});
        statusEl.textContent='已连接 · Gemini Live 通话中';
        btnCall.classList.add('active');
        startAudioCapture('gemini');
        startFrameCapture();
      };
    }else{
      stream=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:SAMPLE_RATE_IN,echoCancellation:true,noiseSuppression:true}});
      videoEl.style.display='none';placeholder.style.display='flex';
      SAMPLE_RATE_OUT=16000;
      const wsUrl=window.LIMA_CONFIG.wsOrigin+'/v1/voice'+'?ticket='+encodeURIComponent(ticket);
      ws=new WebSocket(wsUrl);
      ws.onopen=()=>{
        statusEl.textContent='已连接 · 本地语音对话';
        btnCall.classList.add('active');
        startAudioCapture('local');
      };
    }
    ws.onmessage=e=>{try{handleMessage(JSON.parse(e.data))}catch(err){}};
    ws.onclose=()=>{statusEl.textContent='连接已断开';endCall()};
    ws.onerror=()=>{statusEl.textContent='连接失败';endCall()};
  }catch(e){statusEl.textContent='错误: '+e.message}
}

function handleMessage(msg){
  if(msg.setupComplete){statusEl.textContent='通话中 · AI 可以看到你';return}
  if(msg.type==='status'){
    statusEl.textContent=msg.transcript?msg.status+' · '+msg.transcript:msg.status;
    if(msg.status==='speaking')videoContainer.classList.add('speaking');
    else videoContainer.classList.remove('speaking');
    return;
  }
  if(msg.type==='transcript'){subtitleEl.textContent=msg.text;return}
  if(msg.type==='reply'){subtitleEl.textContent=msg.text;return}
  if(msg.type==='audio'){
    const pcm=base64ToInt16(msg.data);
    enqueueAudio(pcm);
    videoContainer.classList.add('speaking');
    return;
  }
  if(msg.type==='error'){statusEl.textContent='错误: '+msg.message;return}
  if(msg.serverContent?.modelTurn?.parts){
    for(const p of msg.serverContent.modelTurn.parts){
      if(p.inlineData?.mimeType?.includes('audio')){
        const pcm=base64ToInt16(p.inlineData.data);
        enqueueAudio(pcm);
        videoContainer.classList.add('speaking');
      }
      if(p.text){subtitleEl.textContent=p.text}
    }
  }
  if(msg.serverContent?.turnComplete){videoContainer.classList.remove('speaking')}
}

async function startAudioCapture(mode){
  audioCtx=new AudioContext({sampleRate:SAMPLE_RATE_IN});
  await audioCtx.audioWorklet.addModule(createWorkletURL());
  const src=audioCtx.createMediaStreamSource(stream);
  worklet=new AudioWorkletNode(audioCtx,'pcm-processor');
  worklet.port.onmessage=e=>{
    if(ws?.readyState===1){
      const b64=int16ToBase64(e.data);
      if(mode==='local'){
        ws.send(JSON.stringify({type:'audio',data:b64}));
      }else{
        ws.send(JSON.stringify({realtimeInput:{mediaChunks:[{mimeType:'audio/pcm;rate=16000',data:b64}]}}));
      }
    }
  };
  src.connect(worklet);
}

function startFrameCapture(){
  const canvas=document.createElement('canvas');
  canvas.width=320;canvas.height=240;
  const ctx=canvas.getContext('2d');
  frameTimer=setInterval(()=>{
    if(ws?.readyState!==1)return;
    ctx.drawImage(videoEl,0,0,320,240);
    const jpeg=canvas.toDataURL('image/jpeg',0.6).split(',')[1];
    ws.send(JSON.stringify({realtimeInput:{mediaChunks:[{mimeType:'image/jpeg',data:jpeg}]}}));
  },1000);
}
</script>
<script>
// Audio playback
function enqueueAudio(pcmData){
  audioQueue.push(pcmData);
  if(!playing)playAudioQueue();
}
async function playAudioQueue(){
  if(!audioQueue.length){playing=false;return}
  playing=true;
  if(!audioCtx)audioCtx=new AudioContext({sampleRate:SAMPLE_RATE_OUT});
  const pcm=audioQueue.shift();
  const buf=audioCtx.createBuffer(1,pcm.length,SAMPLE_RATE_OUT);
  const ch=buf.getChannelData(0);
  for(let i=0;i<pcm.length;i++)ch[i]=pcm[i]/32768;
  const src=audioCtx.createBufferSource();
  src.buffer=buf;src.connect(audioCtx.destination);
  src.onended=()=>playAudioQueue();
  if(nextPlayTime<audioCtx.currentTime)nextPlayTime=audioCtx.currentTime;
  src.start(nextPlayTime);
  nextPlayTime+=buf.duration;
}
function base64ToInt16(b64){
  const bin=atob(b64),len=bin.length/2,arr=new Int16Array(len);
  for(let i=0;i<len;i++)arr[i]=bin.charCodeAt(i*2)|(bin.charCodeAt(i*2+1)<<8);
  return arr;
}
function int16ToBase64(int16arr){
  const bytes=new Uint8Array(int16arr.buffer);
  let bin='';for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function createWorkletURL(){
  const code=`class P extends AudioWorkletProcessor{
    constructor(){super();this.buf=new Int16Array(512);this.idx=0}
    process(inputs){
      const ch=inputs[0]?.[0];if(!ch)return true;
      for(let i=0;i<ch.length;i++){
        this.buf[this.idx++]=Math.max(-32768,Math.min(32767,ch[i]*32768));
        if(this.idx>=512){this.port.postMessage(this.buf.slice());this.idx=0}
      }return true;
    }
  }registerProcessor('pcm-processor',P);`;
  return URL.createObjectURL(new Blob([code],{type:'application/javascript'}));
}
function endCall(){
  if(frameTimer){clearInterval(frameTimer);frameTimer=null}
  if(worklet){worklet.disconnect();worklet=null}
  if(audioCtx){audioCtx.close();audioCtx=null}
  if(ws){ws.close();ws=null}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
  videoEl.style.display='none';placeholder.style.display='flex';
  audioQueue=[];playing=false;nextPlayTime=0;
  btnCall.classList.remove('active');
  videoContainer.classList.remove('speaking');
  subtitleEl.textContent='';
  statusEl.textContent='通话已结束';
}
btnCall.addEventListener('click',()=>{if(!ws||ws.readyState!==1)startCall()});
btnEnd.addEventListener('click',endCall);
</script>
</body>
</html>
