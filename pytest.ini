[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
timeout = 120
timeout_method = thread
timeout_func_only = True
testpaths = tests
pythonpath = . packages/provider-probe-offline
markers =
    rag_gate: offline RAG retrieval eval gate fixtures (CI)
    dashscope_live: live DashScope Wanx image API (needs ALIYUN_API_KEY + LIMA_DEVICE_ADMISSION_LIVE=1)
    offline_probe: provider_probe browser helper tests (JDCloud Cold package)

[coverage:run]
source = .
omit =
    .venv310/*
    reference/*
    esp32S_XYZ/*
    packages/provider-probe-offline/*
    tests/*
    scripts/*
    __pycache__/*
branch = True

[coverage:report]
fail_under = 0
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
