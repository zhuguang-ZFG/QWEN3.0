# OpenObserve — VPS/local log observability (PE-C-2)
# Bind loopback only; SSH tunnel for UI access.

services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: lima-openobserve
    restart: unless-stopped
    ports:
      - "127.0.0.1:5080:5080"
    environment:
      ZO_DATA_DIR: /data
      ZO_ROOT_USER_EMAIL: ${OPENOBSERVE_USER:-root@example.com}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_PASSWORD:-change-me-local}
    env_file:
      - .env
    volumes:
      - openobserve-data:/data

volumes:
  openobserve-data:
