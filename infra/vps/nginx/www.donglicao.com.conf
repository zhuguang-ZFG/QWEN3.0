# Sanitized snapshot of /etc/nginx/conf.d/www.donglicao.com.conf
# Updated from VPS: 2026-06-18

map $http_origin $demo_cors_origin {
    default "";
    "~^https://(www\.)?donglicao\.com$" $http_origin;
}

server {
    server_name www.donglicao.com donglicao.com;
    root /www/wwwroot/donglicao-site;
    index index.html;

    sub_filter '</body>' '<script src="/contact-fix.js"></script><script src="/lima-demo.js"></script></body>';
    sub_filter_once on;

    location = /api/demo {
        proxy_pass http://127.0.0.1:8080/v1/chat/completions;
        proxy_set_header Host $host;
        proxy_set_header Content-Type "application/json";
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin $demo_cors_origin always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /_next/static/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/www.donglicao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.donglicao.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name www.donglicao.com donglicao.com;
    return 301 https://$host$request_uri;
}
