# Sanitized snapshot of /etc/nginx/conf.d/www.donglicao.com.conf
# Updated from VPS: 2026-05-24

server {
    server_name www.donglicao.com donglicao.com;
    root /www/wwwroot/donglicao-site;
    index index.html;

    sub_filter '</body>' '<script src="/contact-fix.js"></script><script src="/lima-demo.js"></script></body>';
    sub_filter_once on;

    location = /api/demo {
        proxy_pass http://127.0.0.1:8080/v1/chat/completions;
        proxy_set_header Host $host;
        proxy_set_header Content-Type "application/json";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header User-Agent $http_user_agent;
        # Replace at deploy time from the VPS secret store; never commit a live key.
        proxy_set_header Authorization "Bearer REPLACE_WITH_LIMA_API_KEY";
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # st.236600.xyz image generation proxy
    location ~ ^/api/st236600_(generate|status|models)$ {
        proxy_pass http://127.0.0.1:8080/v1/images/st236600_$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header Content-Type "application/json";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header User-Agent $http_user_agent;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Agnes AI image generation proxy
    location = /api/agnes_generate {
        proxy_pass http://127.0.0.1:8080/v1/images/agnes_generate;
        proxy_set_header Host $host;
        proxy_set_header Content-Type "application/json";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header User-Agent $http_user_agent;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Jina AI embedding & rerank proxy
    location ~ ^/api/jina_(embeddings|rerank)$ {
        proxy_pass http://127.0.0.1:8080/v1/$1/jina;
        proxy_set_header Host $host;
        proxy_set_header Content-Type "application/json";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header User-Agent $http_user_agent;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /_next/static/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/www.donglicao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.donglicao.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name www.donglicao.com donglicao.com;
    return 301 https://$host$request_uri;
}
