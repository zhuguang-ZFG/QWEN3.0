# Sanitized snapshot of /etc/nginx/conf.d/donglicao.conf
# Updated from VPS: 2026-05-24

server {
    server_name api.donglicao.com;

    add_header Strict-Transport-Security "max-age=15552000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter_types application/javascript text/css;

    sub_filter '<title>New API</title>' '<title>LiMa AI - 开放平台</title>';
    sub_filter '<title>new-api</title>' '<title>LiMa AI - 开放平台</title>';

    sub_filter 'New API' 'LiMa AI';
    sub_filter 'new-api' 'LiMa AI';
    sub_filter 'New Api' 'LiMa AI';
    sub_filter 'NewAPI' 'LiMa AI';
    sub_filter 'ONE API' 'LiMa AI';
    sub_filter 'One API' 'LiMa AI';
    sub_filter 'one-api' 'LiMa AI';

    sub_filter 'github.com/Calcium-Ion/new-api' '#';
    sub_filter 'github.com/songquanpeng/one-api' '#';
    sub_filter 'Calcium-Ion' 'LiMa';
    sub_filter 'songquanpeng' 'donglicao';
    sub_filter 'https://docs.newapi.pro' '#';
    sub_filter 'docs.newapi.pro' '#';
    sub_filter 'newapi.pro' 'donglicao.com';
    sub_filter 'newapi' 'lima';
    sub_filter 'href="/logo.png"' 'href="https://www.donglicao.com/favicon.ico"';

    sub_filter '</head>' '<style>:root{--background:#0E0C15!important;--foreground:#e2e8f0!important;--card:#1a1625!important;--primary:#6366f1!important;--primary-foreground:#fff!important;--secondary:#1e1b2e!important;--muted:#1e1b2e!important;--accent:#6366f1!important;--border:rgba(99,102,241,.2)!important;--ring:#6366f1!important;--radius:12px!important;--semi-color-primary:#6366f1!important;--semi-color-bg-0:#0E0C15!important;--semi-color-bg-1:#1a1625!important;--semi-color-bg-2:#1e1b2e!important;--semi-color-text-0:#e2e8f0!important;--semi-color-text-1:#cbd5e1!important;--semi-color-border:#2d2a3e!important;--semi-color-fill-0:#1e1b2e!important;--semi-color-nav-bg:#0E0C15!important}body{background:#0E0C15!important;color:#e2e8f0!important;font-family:system-ui,sans-serif!important}.semi-layout,.semi-layout-content,.semi-layout-sider{background:#0E0C15!important}.semi-navigation{background:#0E0C15!important;border-right:1px solid rgba(99,102,241,.15)!important}.semi-navigation-item,.semi-navigation-item-text{color:#e2e8f0!important}.semi-navigation-item-selected,.semi-navigation-item:hover{background:rgba(99,102,241,.15)!important}.semi-navigation-header-logo+.semi-navigation-header-text{font-size:0!important}.semi-navigation-header-logo+.semi-navigation-header-text::after{content:"LiMa AI";font-size:16px!important;font-weight:700!important;background:linear-gradient(135deg,#89F9E8,#FACB7B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.semi-card,.semi-table{background:#1a1625!important;border-color:rgba(99,102,241,.15)!important;border-radius:12px!important}.semi-button-primary{background:#6366f1!important;border:0!important;border-radius:8px!important}.semi-input-wrapper,.semi-select{background:#1e1b2e!important;border-color:rgba(99,102,241,.25)!important;border-radius:8px!important;color:#e2e8f0!important}a[href*=github],a[href*=newapi.pro],a[href*=docs.newapi],[class*=github],[class*=GitHub]{display:none!important}footer,[class*=footer]{display:none!important}</style></head>';

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.donglicao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.donglicao.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.donglicao.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name api.donglicao.com;

    add_header Strict-Transport-Security "max-age=15552000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    return 404;
}
