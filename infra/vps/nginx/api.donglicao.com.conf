# Sanitized snapshot of /etc/nginx/conf.d/donglicao.conf
# Updated from VPS: 2026-06-09

server {
    server_name api.donglicao.com;

    add_header Strict-Transport-Security "max-age=15552000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ^~ /telegram/ {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:8769;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.donglicao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.donglicao.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.donglicao.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name api.donglicao.com;
    return 404;
}
